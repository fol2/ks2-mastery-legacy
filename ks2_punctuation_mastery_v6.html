  function loadAIConfig() {
    const safeParse = value => {
      try {
        return value ? JSON.parse(value) : {};
      } catch (err) {
        return {};
      }
    };
    const local = safeParse(localStorage.getItem(AI_LOCAL_KEY));
    const session = safeParse(sessionStorage.getItem(AI_SESSION_KEY));
    return Object.assign({ provider: 'off', model: '', apiKey: '', rememberKey: false }, local, session);
  }

  function saveAIConfig(cfg) {
    const safe = {
      provider: cfg.provider || 'off',
      model: cfg.model || '',
      apiKey: cfg.apiKey || '',
      rememberKey: !!cfg.rememberKey
    };
    if (safe.rememberKey) {
      localStorage.setItem(AI_LOCAL_KEY, JSON.stringify(safe));
      sessionStorage.removeItem(AI_SESSION_KEY);
    } else {
      localStorage.removeItem(AI_LOCAL_KEY);
      sessionStorage.setItem(AI_SESSION_KEY, JSON.stringify(safe));
    }
  }

  // =============================
  // Content and enrichment helpers
  // =============================
  function getAllItems(profile = activeProfile()) {
    return CONTENT.concat(profile.customItems || []);
  }

  function getTrackedItems(profile = activeProfile()) {
    return CONTENT.concat((profile.customItems || []).filter(item => {
      const state = profile.itemStates ? profile.itemStates[item.id] : null;
      return !!(state && state.attempts > 0);
    }));
  }

  function findItemById(itemId, profile = activeProfile()) {
    return getAllItems(profile).find(item => item.id === itemId) || null;
  }

  function getLexicon(profile = activeProfile()) {
    const adds = profile.lexiconAdds || {};
    return {
      names: uniqueStrings([].concat(LEXICON_BASE.names, adds.names || [])),
      places: uniqueStrings([].concat(LEXICON_BASE.places, adds.places || [])),
      objects: uniqueStrings([].concat(LEXICON_BASE.objects)),
      listItems: uniqueStrings([].concat(LEXICON_BASE.listItems, adds.listItems || [])),
      frontedAdverbials: uniqueStrings([].concat(LEXICON_BASE.frontedAdverbials, adds.frontedAdverbials || [])),
      reportingVerbs: uniqueStrings([].concat(LEXICON_BASE.reportingVerbs)),
      speechCommands: uniqueStrings([].concat(LEXICON_BASE.speechCommands, adds.speechCommands || [])),
      speechQuestions: uniqueStrings([].concat(LEXICON_BASE.speechQuestions, adds.speechQuestions || [])),
      parenthesisPhrases: uniqueStrings([].concat(LEXICON_BASE.parenthesisPhrases, adds.parenthesisPhrases || [])),
      clausePairs: LEXICON_BASE.clausePairs.slice(),
      cityCountry: LEXICON_BASE.cityCountry.slice(),
      compounds: [].concat(LEXICON_BASE.compounds, (adds.compounds || []).map(sanitizeCompoundEntry).filter(Boolean)),
      vocatives: uniqueStrings([].concat(LEXICON_BASE.vocatives)),
      activities: uniqueStrings([].concat(LEXICON_BASE.activities)),
      roles: uniqueStrings([].concat(LEXICON_BASE.roles)),
      stems: uniqueStrings([].concat(LEXICON_BASE.stems, adds.stems || []))
    };
  }

  function prereqReady(profile, skillId) {
    const skill = SKILL_BY_ID[skillId];
    if (!skill || !skill.prereq || !skill.prereq.length) return true;
    return skill.prereq.every(id => skillSnapshot(profile, id).mastery >= 32);
  }

  function v5GeneratedCounts(profile = activeProfile()) {
    const skillCounts = {};
    const familyCounts = {};
    (profile.customItems || []).forEach(item => {
      (item.skillIds || []).forEach(skillId => {
        skillCounts[skillId] = (skillCounts[skillId] || 0) + 1;
      });
      const familyId = item.familyId || item.id;
      familyCounts[familyId] = (familyCounts[familyId] || 0) + 1;
    });
    return { skillCounts, familyCounts };
  }

  function mergeContextPackIntoProfile(pack, profile = activeProfile()) {
    const defaults = createProfile().lexiconAdds;
    const adds = Object.assign({}, defaults, profile.lexiconAdds || {});
    Object.keys(defaults).forEach(key => {
      if (key === 'compounds') return;
      adds[key] = uniqueStrings([].concat(adds[key] || [], pack[key] || [])).slice(0, 80);
    });
    adds.compounds = v5UniqueCompounds([].concat(adds.compounds || [], pack.compounds || [])).slice(0, 50);
    profile.lexiconAdds = adds;
    profile.generatedStats.contextPacks = (profile.generatedStats.contextPacks || 0) + 1;
  }

  function validateContextPackStrict(raw) {
    const keys = ['names', 'places', 'listItems', 'frontedAdverbials', 'speechCommands', 'speechQuestions', 'parenthesisPhrases', 'stems'];
    const pack = {};
    let accepted = 0;
    let rejected = 0;
    const currentLexicon = getLexicon();

    keys.forEach(key => {
      const values = Array.isArray(raw && raw[key]) ? raw[key] : [];
      const clean = [];
      const existing = new Set((currentLexicon[key] || []).map(v5CanonicalDup));
      const localSeen = new Set();
      values.forEach(value => {
        const entry = v5CanonicalContextEntry(key, value);
        const dupKey = v5CanonicalDup(entry);
        if (!entry || !v3SafePattern(key, entry) || existing.has(dupKey) || localSeen.has(dupKey)) {
          rejected += 1;
          return;
        }
        clean.push(entry);
        localSeen.add(dupKey);
      });
      pack[key] = clean.slice(0, V2_CONTEXT_ENTRY_LIMIT);
      accepted += pack[key].length;
    });

    const compounds = [];
    const existingCompounds = new Set((currentLexicon.compounds || []).map(row => `${row.hyphen}|${row.tail}`));
    const localCompounds = new Set();
    (Array.isArray(raw && raw.compounds) ? raw.compounds : []).forEach(entry => {
      const row = sanitizeCompoundEntry(entry);
      if (!row) {
        rejected += 1;
        return;
      }
      const key = `${row.hyphen}|${row.tail}`;
      if (row.hyphen !== row.plain.replace(/ /g, '-') || /[^a-z -]/.test(row.plain) || /[^a-z-]/.test(row.hyphen) || /[^a-z -]/.test(row.tail) || existingCompounds.has(key) || localCompounds.has(key)) {
        rejected += 1;
        return;
      }
      compounds.push(row);
      localCompounds.add(key);
    });
    pack.compounds = compounds.slice(0, V2_CONTEXT_ENTRY_LIMIT);
    accepted += pack.compounds.length;

    if (!keys.some(key => pack[key].length) && !pack.compounds.length) {
      throw new Error('The context pack was empty after strict validation.');
    }
    return { pack, summary: { accepted, rejected } };
  }

  function clearAddedContext() {
    const profile = activeProfile();
    profile.lexiconAdds = createProfile().lexiconAdds;
    saveDB();
  }

  function pruneGeneratedItems(profile = activeProfile()) {
    if ((profile.customItems || []).length <= V2_GENERATED_LIMIT) return;
    const states = profile.itemStates || {};
    const scored = (profile.customItems || []).map(item => {
      const state = states[item.id] || {};
      const attempted = state.attempts > 0 ? 1 : 0;
      const lastSeen = state.lastSeen || 0;
      const familyId = item.familyId || item.id;
      return { item, familyId, score: attempted * 1000000 + lastSeen };
    }).sort((a, b) => b.score - a.score);

    const keep = [];
    const keepIds = new Set();
    const familySeen = new Set();

    scored.forEach(row => {
      if (keep.length >= Math.min(V2_GENERATED_LIMIT, GENERATOR_FAMILIES.length + 18)) return;
      if (!familySeen.has(row.familyId)) {
        keep.push(row.item);
        keepIds.add(row.item.id);
        familySeen.add(row.familyId);
      }
    });

    scored.forEach(row => {
      if (keep.length >= V2_GENERATED_LIMIT) return;
      if (!keepIds.has(row.item.id)) {
        keep.push(row.item);
        keepIds.add(row.item.id);
      }
    });

    profile.customItems = keep.slice(0, V2_GENERATED_LIMIT);
  }

  // =============================
  // Analytics and adaptivity
  // =============================
  function itemStateSnapshot(profile, item) {
    const state = ensureItemState(profile, item.id);
    const accuracy = state.attempts ? state.correct / state.attempts : 0;
    let bucket = 'new';
    if (state.attempts === 0) bucket = 'new';
    else if (accuracy < 0.65 || (state.lapses >= 2 && state.streak === 0)) bucket = 'weak';
    else if (state.dueAt && state.dueAt <= now()) bucket = 'due';
    else if (state.intervalDays >= 7 && state.streak >= 3 && accuracy >= 0.8) bucket = 'secure';
    else bucket = 'learning';
    const mastery = state.attempts === 0 ? 0 : Math.round(100 * (accuracy * 0.55 + Math.min(state.intervalDays / 14, 1) * 0.25 + Math.min(state.streak / 4, 1) * 0.20));
    return { state, accuracy, bucket, mastery, due: state.dueAt <= now() };
  }

  function facetSnapshot(profile, skillId, mode) {
    const state = ensureFacetState(profile, facetKey(skillId, mode));
    const accuracy = state.attempts ? state.correct / state.attempts : 0;
    const mastery = state.attempts === 0 ? 0 : Math.round(100 * (accuracy * 0.65 + Math.min(state.streak / 4, 1) * 0.2 + Math.min(state.intervalDays / 10, 1) * 0.15));
    return { state, accuracy, mastery };
  }

  function getTodayStats(profile = activeProfile()) {
    const key = localDayKey();
    const todayLogs = profile.attemptLog.filter(log => localDayKey(log.ts) === key);
    return {
      attempts: todayLogs.length,
      correct: todayLogs.filter(log => log.correct).length
    };
  }

  function skillSnapshot(profile, skillId) {
    const items = getTrackedItems(profile).filter(item => item.skillIds.includes(skillId));
    const snaps = items.map(item => itemStateSnapshot(profile, item));
    const attempts = snaps.reduce((sum, snap) => sum + snap.state.attempts, 0);
    const correct = snaps.reduce((sum, snap) => sum + snap.state.correct, 0);
    const dueCount = snaps.filter(snap => snap.bucket === 'due').length;
    const weakCount = snaps.filter(snap => snap.bucket === 'weak').length;
    const secureCount = snaps.filter(snap => snap.bucket === 'secure').length;
    const mastery = snaps.length ? Math.round(snaps.reduce((sum, snap) => sum + snap.mastery, 0) / snaps.length) : 0;
    return { skill: SKILL_BY_ID[skillId], items, attempts, correct, dueCount, weakCount, secureCount, mastery };
  }

  function computeAnalytics(profile = activeProfile()) {
    const itemSnaps = getTrackedItems(profile).map(item => ({ item, snap: itemStateSnapshot(profile, item) }));
    const counts = { new: 0, learning: 0, weak: 0, due: 0, secure: 0 };
    itemSnaps.forEach(({ snap }) => counts[snap.bucket]++);

    const attempts = profile.attemptLog.length;
    const correct = profile.attemptLog.filter(log => log.correct).length;
    const overallAccuracy = attempts ? Math.round(correct / attempts * 100) : 0;

    const bySessionMode = MODES.map(mode => {
      const logs = profile.attemptLog.filter(log => log.sessionMode === mode.id);
      const accuracy = logs.length ? Math.round(100 * logs.filter(log => log.correct).length / logs.length) : 0;
      return { mode: mode.id, attempts: logs.length, accuracy };
    });

    const byItemMode = ['insert', 'fix', 'paragraph', 'choose', 'combine', 'transfer'].map(mode => {
      const logs = profile.attemptLog.filter(log => log.itemMode === mode);
      const accuracy = logs.length ? Math.round(100 * logs.filter(log => log.correct).length / logs.length) : 0;
      return { mode, attempts: logs.length, accuracy };
    });

    const skillRows = SKILLS.map(skill => skillSnapshot(profile, skill.id)).sort((a, b) => a.mastery - b.mastery || a.attempts - b.attempts);
    const recentMistakes = [...profile.attemptLog].filter(log => !log.correct).slice(-8).reverse().map(log => ({ ...log, item: findItemById(log.itemId, profile) }));

    const dailyMap = {};
    profile.attemptLog.forEach(log => {
      const key = localDayKey(log.ts);
      if (!dailyMap[key]) dailyMap[key] = { attempts: 0, correct: 0 };
      dailyMap[key].attempts += 1;
      if (log.correct) dailyMap[key].correct += 1;
    });

    const today = new Date();
    let streak = 0;
    const cursor = new Date(today.getFullYear(), today.getMonth(), today.getDate());
    while (true) {
      const key = localDayKey(cursor.getTime());
      if (dailyMap[key] && dailyMap[key].attempts > 0) {
        streak += 1;
        cursor.setDate(cursor.getDate() - 1);
      } else {
        break;
      }
    }

    const dueToday = itemSnaps.filter(row => row.snap.bucket === 'due').length;
    const weakItems = itemSnaps.filter(row => row.snap.bucket === 'weak').length;
    const facetRows = Object.keys(profile.facetStates || {}).map(key => {
      const [skillId, mode] = key.split('::');
      const snap = facetSnapshot(profile, skillId, mode);
      return {
        key,
        skillId,
        mode,
        mastery: snap.mastery,
        attempts: snap.state.attempts,
        accuracy: snap.state.attempts ? Math.round(snap.accuracy * 100) : 0
      };
    }).sort((a, b) => a.mastery - b.mastery || a.attempts - b.attempts);

    const todayStats = getTodayStats(profile);
    const goal = APP.db.settings.dailyGoal || 12;
    const dailyGoalProgress = Math.min(100, Math.round(todayStats.attempts / goal * 100));
    const productionAttempts = byItemMode.filter(row => V2_PRODUCTION_MODES.has(row.mode)).reduce((sum, row) => sum + row.attempts, 0);
    const recognitionAttempts = byItemMode.filter(row => !V2_PRODUCTION_MODES.has(row.mode)).reduce((sum, row) => sum + row.attempts, 0);

    return {
      itemSnaps,
      counts,
      attempts,
      overallAccuracy,
      skillRows,
      recentMistakes,
      dueToday,
      weakItems,
      bySessionMode,
      byItemMode,
      streak,
      activeDays: Object.keys(dailyMap).length,
      todayAttempts: todayStats.attempts,
      todayCorrect: todayStats.correct,
      dailyGoalProgress,
      weakestFacets: facetRows.slice(0, 8),
      generatedItemCount: (profile.customItems || []).length,
      contextPackCount: profile.generatedStats ? profile.generatedStats.contextPacks || 0 : 0,
      productionAttempts,
      recognitionAttempts,
      paragraphAttempts: byItemMode.find(row => row.mode === 'paragraph')?.attempts || 0
    };
  }

  function getWeakSkillIds(profile = activeProfile(), limit = 3) {
    return SKILLS.map(skill => skillSnapshot(profile, skill.id)).sort((a, b) => a.mastery - b.mastery || a.attempts - b.attempts).slice(0, limit).map(row => row.skill.id);
  }

  function chooseGuidedSkill(profile = activeProfile()) {
    return getWeakSkillIds(profile, 1)[0] || SKILLS[0].id;
  }

  function v3SmartStage(session) {
    if (!session || !['smart', 'weak'].includes(session.mode)) return null;
    return V3_SMART_CYCLE[(session.answeredCount || 0) % V3_SMART_CYCLE.length];
  }

  function v3ItemJob(item) {
    if (!item) return 'unknown';
    if (item.mode === 'choose') return 'recognise_and_choose';
    if (['insert', 'combine'].includes(item.mode)) return 'place_marks';
    if (item.mode === 'fix') return 'spot_and_fix';
    if (item.mode === 'paragraph') return 'paragraph_proofread';
    if (item.mode === 'transfer') return 'writing_transfer';
    return item.mode;
  }

  function chooseGeneratorFamily(profile = activeProfile(), options = {}) {
    const counts = v5GeneratedCounts(profile);
    let families = GENERATOR_FAMILIES.slice();
    const targetSkillIds = options.skillIds && options.skillIds.length ? uniqueStrings(options.skillIds) : [];
    if (targetSkillIds.length) {
      const targeted = families.filter(family => targetSkillIds.includes(family.skillId));
      if (targeted.length) families = targeted;
    }
    if (options.preferredMode) {
      const preferred = families.filter(family => family.mode === options.preferredMode);
      if (preferred.length) families = preferred;
    }

    const weakSet = new Set(getWeakSkillIds(profile, 8));
    const recentFamilies = new Set((APP.session && APP.session.recentFamilies || []).slice(-3));
    const recentSkills = new Set((APP.session && APP.session.recentSkills || []).slice(-5));

    const weighted = families.map(family => {
      let weight = 1;
      const skillMastery = skillSnapshot(profile, family.skillId).mastery;
      const facet = facetSnapshot(profile, family.skillId, family.mode);
      const skillStock = counts.skillCounts[family.skillId] || 0;
      const familyStock = counts.familyCounts[family.id] || 0;
      weight *= 1 + (100 - skillMastery) / 75;
      weight *= 1 + (100 - facet.mastery) / 95;
      if (skillStock < 6) weight *= 1.35 + (6 - skillStock) * 0.08;
      if (familyStock < 4) weight *= 1.22 + (4 - familyStock) * 0.07;
      if (weakSet.has(family.skillId)) weight *= 1.18;
      if (!prereqReady(profile, family.skillId) && skillMastery < 20) weight *= 0.52;
      if (recentFamilies.has(family.id)) weight *= 0.58;
      if (recentSkills.has(family.skillId)) weight *= 0.78;

      if (APP.session && ['smart', 'weak'].includes(APP.session.mode)) {
        const modeCounts = APP.session.modeCounts || {};
        const productionCount = Object.entries(modeCounts).filter(([modeId]) => V2_PRODUCTION_MODES.has(modeId)).reduce((sum, [, count]) => sum + count, 0);
        const chooseCount = modeCounts.choose || 0;
        const paragraphCount = modeCounts.paragraph || 0;
        if (V2_PRODUCTION_MODES.has(family.mode) && productionCount < Math.max(3, chooseCount * 2)) weight *= 1.45;
        if (family.mode === 'choose' && productionCount >= Math.max(3, chooseCount * 2)) weight *= 0.72;
        if (family.mode === 'paragraph' && paragraphCount < Math.max(1, Math.floor((APP.session.answeredCount || 0) / 5))) weight *= 1.45;
      }

      return { family, weight: Math.max(0.05, weight) };
    });

    const pick = weightedPick(weighted);
    return pick ? pick.family : families[0] || null;
  }

  function maybeTopUpGeneratedItems(profile = activeProfile(), options = {}) {
    if (!APP.db.settings.autoGenerateItems && !options.allowWhenDisabled) return 0;
    if (!profile.customItems) profile.customItems = [];

    const hasMinimumStock = options.minimumStock !== undefined && options.minimumStock !== null && options.minimumStock !== '';
    const minimumStock = clamp(hasMinimumStock ? Number(options.minimumStock) : V2_MIN_GENERATED_STOCK, 0, V2_GENERATED_LIMIT);
    const requiredMatching = Math.max(0, parseInt(options.forceCount, 10) || 0);
    const targetSkillIds = uniqueStrings(options.skillIds && options.skillIds.length ? options.skillIds : SKILLS.map(skill => skill.id));
    const preferredMode = options.preferredMode || null;
    const matchesTarget = item => item.skillIds.some(skillId => targetSkillIds.includes(skillId)) && (!preferredMode || item.mode === preferredMode);
    const matchingCount = () => (profile.customItems || []).filter(matchesTarget).length;

    let desiredTotal = minimumStock;
    if (requiredMatching && matchingCount() < requiredMatching) {
      desiredTotal = Math.max(desiredTotal, Math.min(V2_GENERATED_LIMIT, profile.customItems.length + (requiredMatching - matchingCount())));
    }

    if (profile.customItems.length >= desiredTotal && matchingCount() >= requiredMatching) return 0;

    const signatureSet = new Set(getAllItems(profile).map(buildItemSignature));
    let added = 0;
    let tries = 0;
    while (tries < 1400 && (profile.customItems.length < desiredTotal || matchingCount() < requiredMatching)) {
      tries += 1;
      const family = chooseGeneratorFamily(profile, { skillIds: targetSkillIds, preferredMode });
      if (!family) break;
      const item = family.generate(profile);
      if (!item) continue;
      const signature = buildItemSignature(item);
      if (signatureSet.has(signature)) continue;
      profile.customItems.push(item);
      signatureSet.add(signature);
      added += 1;
      if (profile.customItems.length > V2_GENERATED_LIMIT) pruneGeneratedItems(profile);
    }

    if (added) {
      profile.generatedStats.created = (profile.generatedStats.created || 0) + added;
      pruneGeneratedItems(profile);
      saveDB();
    }
    return added;
  }

  // =============================
  // Session flow and scheduling
  // =============================
  function prepareItemRender(item) {
    if (!item) {
      APP.renderOptions = null;
      return;
    }
    if (item.mode === 'choose') {
      const options = item.options.map((text, index) => ({ text, originalIndex: index }));
      for (let i = options.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [options[i], options[j]] = [options[j], options[i]];
      }
      APP.renderOptions = options;
    } else {
      APP.renderOptions = null;
    }
  }

  function rememberSessionItem(item) {
    if (!APP.session || !item) return;
    APP.session.lastItemId = item.id;
    APP.session.recentItems = APP.session.recentItems || [];
    APP.session.recentSkills = APP.session.recentSkills || [];
    APP.session.recentModes = APP.session.recentModes || [];
    APP.session.recentFamilies = APP.session.recentFamilies || [];
    APP.session.recentItems.push(item.id);
    APP.session.recentModes.push(item.mode);
    APP.session.recentFamilies.push(item.familyId || item.id);
    uniqueStrings(item.skillIds || []).forEach(skillId => APP.session.recentSkills.push(skillId));
    while (APP.session.recentItems.length > 8) APP.session.recentItems.shift();
    while (APP.session.recentModes.length > 8) APP.session.recentModes.shift();
    while (APP.session.recentFamilies.length > 8) APP.session.recentFamilies.shift();
    while (APP.session.recentSkills.length > 10) APP.session.recentSkills.shift();
  }

  function startTimer() {
    stopTimer();
    if (!APP.session || APP.session.mode !== 'gps') return;
    APP.testTimer = setInterval(() => {
      if (!APP.session || APP.session.mode !== 'gps') {
        stopTimer();
        return;
      }
      APP.session.remainingSec -= 1;
      if (APP.session.remainingSec <= 0) {
        APP.session.remainingSec = 0;
        stopTimer();
        finishTest();
        return;
      }
      render();
    }, 1000);
  }

  function stopTimer() {
    if (APP.testTimer) {
      clearInterval(APP.testTimer);
      APP.testTimer = null;
    }
  }

  function finishTest() {
    stopTimer();
    if (!APP.session || APP.session.mode !== 'gps') return;
    APP.feedback = { type: 'testSummary', session: APP.session };
    APP.currentItem = null;
    render();
  }

  function maybeSpeakPrompt() {
    if (!APP.db.settings.speechEnabled || !APP.db.settings.autoReadPrompt || !window.speechSynthesis || !APP.currentItem) return;
    speakText(`${APP.currentItem.prompt} ${APP.currentItem.stem || ''}`);
  }

  function speakText(text) {
    if (!APP.db.settings.speechEnabled || !window.speechSynthesis || !text) return;
    window.speechSynthesis.cancel();
    const utter = new SpeechSynthesisUtterance(text);
    utter.rate = clamp(Number(APP.db.settings.speechRate) || 1, 0.7, 1.3);
    window.speechSynthesis.speak(utter);
  }

  function focusResponseControl() {
    requestAnimationFrame(() => {
      if (!APP.currentItem) return;
      if (APP.currentItem.mode === 'choose') {
        const radio = $('input[name="choice"]');
        if (radio) radio.focus();
      } else {
        const editor = byId('responseEditor');
        if (editor) {
          editor.focus();
          try {
            editor.setSelectionRange(editor.value.length, editor.value.length);
          } catch (err) {}
        }
      }
    });
  }

  function getEligibleItems(mode, profile = activeProfile(), extra = {}) {
    maybeTopUpGeneratedItems(profile, {
      skillIds: extra.skillId ? [extra.skillId] : getWeakSkillIds(profile, 6),
      preferredMode: ['insert', 'fix', 'choose', 'combine', 'transfer', 'paragraph'].includes(mode) ? mode : null,
      forceCount: profile.customItems.length < 96 ? 14 : 0
    });

    let pool = getAllItems(profile).slice();
    if (mode === 'insert') pool = pool.filter(item => item.mode === 'insert');
    if (mode === 'fix') pool = pool.filter(item => item.mode === 'fix');
    if (mode === 'paragraph') pool = pool.filter(item => item.mode === 'paragraph');
    if (mode === 'choose') pool = pool.filter(item => item.mode === 'choose');
    if (mode === 'combine') pool = pool.filter(item => item.mode === 'combine');
    if (mode === 'transfer') pool = pool.filter(item => item.mode === 'transfer');
    if (mode === 'guided') {
      const skillId = extra.skillId || chooseGuidedSkill(profile);
      pool = pool.filter(item => item.skillIds.includes(skillId) && !['transfer', 'paragraph'].includes(item.mode));
    }
    if (mode === 'weak') {
      const weakSkills = getWeakSkillIds(profile, 3);
      pool = pool.filter(item => item.skillIds.some(skillId => weakSkills.includes(skillId)));
    }
    if (mode === 'gps') {
      pool = pool.filter(item => item.satStyle && ['insert', 'fix', 'choose', 'combine'].includes(item.mode));
    }
    return pool;
  }

  function selectAdaptiveItem(mode, extra = {}) {
    const profile = activeProfile();
    const pool = getEligibleItems(mode, profile, extra);
    const session = APP.session;
    const recentItems = session ? session.recentItems || [] : [];
    const recentSkills = session ? session.recentSkills || [] : [];
    const recentModes = session ? session.recentModes || [] : [];
    const recentFamilies = session ? session.recentFamilies || [] : [];
    const duePlans = session ? (session.retryQueue || []).filter(entry => entry.afterCount <= session.answeredCount) : [];
    const stage = v3SmartStage(session);

    if (duePlans.length) {
      maybeTopUpGeneratedItems(profile, {
        skillIds: uniqueStrings(duePlans.map(plan => plan.skillId)),
        preferredMode: duePlans[0].mode,
        forceCount: 8
      });
    }

    const weighted = pool.map(item => {
      const snap = itemStateSnapshot(profile, item);
      let weight = 1;
      if (snap.bucket === 'due') weight *= 2.5;
      if (snap.bucket === 'weak') weight *= 2.95;
      if (snap.bucket === 'new') weight *= 1.38;
      if (snap.bucket === 'learning') weight *= 1.05;
      if (snap.bucket === 'secure') weight *= 0.34;

      const skillDeficit = item.skillIds.map(skillId => 100 - skillSnapshot(profile, skillId).mastery).reduce((sum, value) => sum + value, 0) / Math.max(1, item.skillIds.length);
      weight *= 1 + skillDeficit / 165;

      const facetDeficit = item.skillIds.map(skillId => 100 - facetSnapshot(profile, skillId, item.mode).mastery).reduce((sum, value) => sum + value, 0) / Math.max(1, item.skillIds.length);
      weight *= 1 + facetDeficit / 180;

      if (!item.skillIds.every(skillId => prereqReady(profile, skillId)) && snap.bucket === 'new' && mode === 'smart') weight *= 0.35;
      if (recentItems.includes(item.id)) weight *= 0.16;
      if (item.skillIds.some(skillId => recentSkills.slice(-2).includes(skillId))) weight *= 0.66;
      if (recentModes.slice(-2).includes(item.mode)) weight *= 0.86;
      if (item.familyId && recentFamilies.slice(-2).includes(item.familyId)) weight *= 0.74;
      if (session && session.lastItemId === item.id) weight = 0;

      if (['smart', 'weak'].includes(mode)) {
        const modeCounts = session ? session.modeCounts || {} : {};
        const productionCount = Object.entries(modeCounts).filter(([modeId]) => V2_PRODUCTION_MODES.has(modeId)).reduce((sum, [, count]) => sum + count, 0);
        const chooseCount = modeCounts.choose || 0;
        const transferCount = modeCounts.transfer || 0;
        const paragraphCount = modeCounts.paragraph || 0;
        if (V2_PRODUCTION_MODES.has(item.mode) && productionCount < Math.max(2, chooseCount * 2)) weight *= 1.6;
        if (item.mode === 'choose' && productionCount >= Math.max(2, chooseCount * 2)) weight *= 0.72;
        if (item.mode === 'transfer' && transferCount < Math.floor((session ? session.answeredCount : 0) / 4)) weight *= 1.95;
        if (item.mode === 'paragraph' && paragraphCount < Math.max(1, Math.floor((session ? session.answeredCount : 0) / 5))) weight *= 1.9;
      }

      if (stage) {
        if (stage.id === 'retrieve' && ['due', 'weak'].includes(snap.bucket)) weight *= stage.boost;
        if (stage.targetModes.length) {
          if (stage.targetModes.includes(item.mode)) weight *= stage.boost;
          else weight *= stage.penalty;
        }
        if (stage.id === 'discriminate' && item.skillIds.includes('comma_clarity')) weight *= 1.18;
        if (stage.id === 'transfer' && item.tags && item.tags.includes('paragraph')) weight *= 1.12;
      }

      if (duePlans.length) {
        duePlans.forEach(plan => {
          if (item.id === plan.sourceItemId) {
            weight *= 0.42;
          } else if (item.skillIds.includes(plan.skillId) && item.mode === plan.mode) {
            weight *= 2.3;
            if (plan.familyId && item.familyId === plan.familyId) weight *= 1.5;
          }
        });
      }

      return { item, weight };
    }).filter(row => row.weight > 0);

    const pick = weightedPick(weighted);
    return pick ? pick.item : pool[0] || null;
  }

  function beginSession(mode, extra = {}) {
    const profile = activeProfile();
    stopTimer();
    APP.feedback = null;
    APP.aiMessage = '';
    APP.renderOptions = null;
    APP.draftResponse = { itemId: null, value: '' };
    maybeTopUpGeneratedItems(profile, { skillIds: mode === 'guided' && extra.skillId ? [extra.skillId] : getWeakSkillIds(profile, 6), forceCount: 18 });

    if (mode === 'gps') {
      const length = clamp(parseInt(APP.db.settings.testLength, 10) || 10, 5, 20);
      const tempSession = {
        mode,
        startedAt: now(),
        answeredCount: 0,
        correctCount: 0,
        recentItems: [],
        recentSkills: [],
        recentModes: [],
        recentFamilies: [],
        modeCounts: {},
        retryQueue: [],
        queue: [],
        queueIndex: 0,
        responses: [],
        timeLimitSec: Math.round(length * 54)
      };
      APP.session = tempSession;
      while (tempSession.queue.length < length) {
        const item = selectAdaptiveItem('gps');
        if (!item) break;
        if (!tempSession.queue.some(existing => existing.id === item.id)) {
          tempSession.queue.push(item);
          tempSession.recentItems.push(item.id);
          tempSession.recentModes.push(item.mode);
          tempSession.recentFamilies.push(item.familyId || item.id);
          uniqueStrings(item.skillIds || []).forEach(skillId => tempSession.recentSkills.push(skillId));
        }
      }
      APP.session = {
        mode,
        startedAt: now(),
        answeredCount: 0,
        correctCount: 0,
        recentItems: [],
        recentSkills: [],
        recentModes: [],
        recentFamilies: [],
        modeCounts: {},
        retryQueue: [],
        queue: tempSession.queue,
        queueIndex: 0,
        responses: [],
        timeLimitSec: Math.round(tempSession.queue.length * 54),
        remainingSec: Math.round(tempSession.queue.length * 54),
        guidedSkillId: null,
        guidedHelp: 0
      };
      APP.currentItem = APP.session.queue[0] || null;
      prepareItemRender(APP.currentItem);
      startTimer();
    } else {
      APP.session = {
        mode,
        startedAt: now(),
        answeredCount: 0,
        correctCount: 0,
        recentItems: [],
        recentSkills: [],
        recentModes: [],
        recentFamilies: [],
        modeCounts: {},
        retryQueue: [],
        guidedSkillId: mode === 'guided' ? (extra.skillId || chooseGuidedSkill(profile)) : null,
        guidedHelp: mode === 'guided' ? 2 : 0
      };
      APP.currentItem = selectAdaptiveItem(mode, { skillId: APP.session.guidedSkillId });
      prepareItemRender(APP.currentItem);
    }

    render();
    focusResponseControl();
    maybeSpeakPrompt();
  }

  function nextQuestion() {
    if (!APP.session) return;
    APP.feedback = null;
    APP.aiMessage = '';
    APP.draftResponse = { itemId: null, value: '' };

    if (APP.session.mode === 'gps') {
      APP.session.queueIndex += 1;
      APP.currentItem = APP.session.queue[APP.session.queueIndex] || null;
      prepareItemRender(APP.currentItem);
      if (!APP.currentItem) {
        finishTest();
      } else {
        render();
        focusResponseControl();
        maybeSpeakPrompt();
      }
      return;
    }

    maybeTopUpGeneratedItems(activeProfile(), { forceCount: 10, skillIds: getWeakSkillIds(activeProfile(), 6) });
    APP.currentItem = selectAdaptiveItem(APP.session.mode, { skillId: APP.session.guidedSkillId });
    prepareItemRender(APP.currentItem);
    render();
    focusResponseControl();
    maybeSpeakPrompt();
  }

  function collectResponse() {
    if (!APP.currentItem) return '';
    if (APP.currentItem.mode === 'choose') {
      const chosen = $('input[name="choice"]:checked');
      return chosen ? chosen.value : '';
    }
    const editor = byId('responseEditor');
    return editor ? editor.value : '';
  }

  function currentInputSeed(item) {
    if (!item || item.mode === 'choose') return '';
    return item.stem || '';
  }

  function currentRenderedResponse(item) {
    if (APP.feedback && APP.feedback.item && item && APP.feedback.item.id === item.id) return APP.feedback.response || '';
    if (APP.draftResponse && item && APP.draftResponse.itemId === item.id) return APP.draftResponse.value || '';
    return currentInputSeed(item);
  }

  function stashCurrentDraft() {
    if (!APP.currentItem || APP.feedback) return;
    if (APP.currentItem.mode === 'choose') {
      const chosen = $('input[name="choice"]:checked');
      APP.draftResponse = { itemId: APP.currentItem.id, value: chosen ? chosen.value : '' };
      return;
    }
    const editor = byId('responseEditor');
    if (!editor) return;
    APP.draftResponse = { itemId: APP.currentItem.id, value: editor.value };
  }

  // =============================
  // Evaluation and memory updates
  // =============================
  function validateTransfer(item, response) {
    const validator = item.validator || {};
    const text = normalizeText(response);
    const lower = text.toLowerCase();
    const model = item.model || item.answers[0];

    switch (validator.type) {
      case 'startsWithWordQuestion': {
        const firstWordOkay = lower.startsWith(validator.word.toLowerCase() + ' ');
        const endsQuestion = /[?]["']?$/.test(text);
        const startsCapital = /^[A-Z]/.test(text);
        const correct = firstWordOkay && endsQuestion && startsCapital;
        return { correct, expected: model, note: correct ? 'That begins like a question and ends with a question mark.' : `Start with ${validator.word}, use a capital letter, and end with a question mark.` };
      }
      case 'startsWithPhraseComma': {
        const target = validator.phrase.toLowerCase();
        const correct = lower.startsWith(target + ',') && /[.?!]["']?$/.test(text) && /^[A-Z]/.test(text);
        return { correct, expected: model, note: correct ? 'That uses the fronted adverbial comma correctly.' : `Start with "${validator.phrase}," then continue the sentence and finish it correctly.` };
      }
      case 'requiresTokens': {
        const missing = (validator.tokens || []).filter(token => !lower.includes(token.toLowerCase()));
        return { correct: missing.length === 0 && /[.?!]["']?$/.test(text) && /^[A-Z]/.test(text), expected: model, note: missing.length ? `Include these exact forms: ${missing.join(', ')}.` : 'Good. The required punctuated forms are present.' };
      }
      case 'speechWithWords': {
        const stripped = stripPunctuation(text);
        const hasWords = stripped.includes(validator.words.toLowerCase());
        const hasQuote = /["']/g.test(text);
        const hasQuestion = /\?["']?$/.test(text) || /["']\?/.test(text);
        const startsCapital = /^[A-Z]/.test(text);
        return { correct: hasWords && hasQuote && hasQuestion && startsCapital, expected: model, note: hasWords && hasQuote && hasQuestion ? 'The spoken words are punctuated as a question.' : 'Include inverted commas around the spoken words and keep the question mark with the speech.' };
      }
      case 'containsParenthesisPhrase': {
        const hasPhrase = lower.includes(validator.phrase.toLowerCase());
        const hasBrackets = /\(.*\)/.test(text);
        const hasDashes = /—.*—/.test(text) || /- .* -/.test(text);
        return { correct: hasPhrase && (hasBrackets || hasDashes) && /[.?!]["']?$/.test(text), expected: model, note: hasPhrase && (hasBrackets || hasDashes) ? 'The extra detail is marked as parenthesis.' : `Include "${validator.phrase}" as extra information inside brackets or dashes.` };
      }
      case 'containsStemColon': {
        const startsStem = lower.startsWith(validator.stem.toLowerCase());
        const hasColon = text.includes(':');
        const afterColon = text.split(':')[1] || '';
        const listLike = (afterColon.match(/,/g) || []).length >= 1 || /\band\b/.test(afterColon.toLowerCase());
        return { correct: startsStem && hasColon && listLike && /[.?!]["']?$/.test(text), expected: model, note: startsStem && hasColon ? 'The sentence uses a colon to introduce the list.' : 'Keep the opening stem and add a colon before the list.' };
      }
      case 'containsSemicolonPhrases': {
        const left = stripPunctuation(validator.left || '');
        const right = stripPunctuation(validator.right || '');
        const strippedText = stripPunctuation(text);
        const hasLeft = strippedText.includes(left);
        const hasRight = strippedText.includes(right);
        return { correct: hasLeft && hasRight && text.includes(';'), expected: model, note: hasLeft && hasRight && text.includes(';') ? 'The clauses are joined with a semi-colon.' : 'Use a semi-colon to join the two clauses.' };
      }
      case 'containsDashPhrases': {
        const left = stripPunctuation(validator.left || '');
        const right = stripPunctuation(validator.right || '');
        const strippedText = stripPunctuation(text);
        const hasLeft = strippedText.includes(left);
        const hasRight = strippedText.includes(right);
        const hasDash = text.includes('—') || / - /.test(text);
        return { correct: hasLeft && hasRight && hasDash, expected: model, note: hasLeft && hasRight && hasDash ? 'The clauses are joined with a dash.' : 'Use a dash to join the two clauses.' };
      }
      case 'stemWithList': {
        const stemOkay = lower.startsWith(validator.stem.toLowerCase());
        const commas = (text.match(/,/g) || []).length;
        return { correct: stemOkay && commas >= 1 && /[.?!]["']?$/.test(text), expected: model, note: stemOkay && commas >= 1 ? 'That sentence includes a punctuated list.' : 'Keep the stem and add a list with commas between items.' };
      }
      case 'frontedAdverbialWithSpeech': {
        const startsPhrase = lower.startsWith(validator.phrase.toLowerCase() + ',');
        const hasQuotes = /["']/g.test(text);
        return { correct: startsPhrase && hasQuotes && /[.?!]["']?$/.test(text), expected: model, note: startsPhrase && hasQuotes ? 'That combines a fronted adverbial with direct speech.' : `Begin with "${validator.phrase}," and include correctly punctuated direct speech.` };
      }
      default:
        return { correct: false, expected: model, note: 'No validator found.' };
    }
  }

  function evaluateResponse(item, response) {
    if (item.mode === 'choose') {
      const selectedOriginalIndex = parseInt(response, 10);
      const correct = selectedOriginalIndex === item.correctIndex;
      return { correct, expected: item.model, note: item.explanation };
    }
    if (item.validator) return validateTransfer(item, response);
    const actual = normalizeText(response);
    const answers = item.answers.map(normalizeText);
    const correct = answers.includes(actual);
    return { correct, expected: item.model, note: item.explanation };
  }

  function logAttempt(profile, item, response, result) {
    profile.attemptLog.push({
      ts: now(),
      itemId: item.id,
      skillIds: item.skillIds.slice(),
      response,
      expected: result.expected,
      correct: result.correct,
      sessionMode: APP.session ? APP.session.mode : 'smart',
      itemMode: item.mode,
      familyId: item.familyId || null,
      source: item.source || 'fixed',
      jobId: v3ItemJob(item)
    });
    if (profile.attemptLog.length > 1800) profile.attemptLog = profile.attemptLog.slice(-1800);
  }

  function updateMemoryState(state, wasCorrect, guidedSupport = false) {
    state.attempts += 1;
    state.lastSeen = now();
    state.lastCorrect = wasCorrect;
    state.recent.push(wasCorrect ? 1 : 0);
    if (state.recent.length > 12) state.recent.shift();

    if (wasCorrect) {
      state.correct += 1;
      state.streak += 1;
      if (state.attempts === 1) state.intervalDays = 1;
      else if (state.streak === 2) state.intervalDays = Math.max(2, state.intervalDays + 2);
      else state.intervalDays = Math.max(1, Math.round((state.intervalDays || 1) * (guidedSupport ? Math.max(1.2, state.ease - 0.2) : state.ease)));
      state.ease = clamp(state.ease + (guidedSupport ? 0.02 : 0.06), 1.25, 3.2);
      state.dueAt = now() + state.intervalDays * DAY_MS;
    } else {
      state.incorrect += 1;
      state.lapses += 1;
      state.streak = 0;
      state.ease = clamp(state.ease - 0.18, 1.25, 3.2);
      state.intervalDays = 0;
      state.dueAt = now() + 20 * MIN_MS;
    }
  }

  function updateScheduling(profile, item, result) {
    const guidedSupport = APP.session && APP.session.mode === 'guided' && APP.session.guidedHelp > 0;
    updateMemoryState(ensureItemState(profile, item.id), result.correct, guidedSupport);
    item.skillIds.forEach(skillId => updateMemoryState(ensureFacetState(profile, facetKey(skillId, item.mode)), result.correct, guidedSupport));

    if (result.correct) {
      if (APP.session && APP.session.mode === 'guided') APP.session.guidedHelp = Math.max(0, APP.session.guidedHelp - 1);
    } else {
      if (APP.session && APP.session.mode !== 'gps') {
        APP.session.retryQueue.push({
          sourceItemId: item.id,
          skillId: item.skillIds[0],
          mode: item.mode,
          familyId: item.familyId || null,
          afterCount: APP.session.answeredCount + 3
        });
      }
      if (APP.session && APP.session.mode === 'guided') APP.session.guidedHelp = Math.min(2, APP.session.guidedHelp + 1);
    }
  }

  function submitCurrent() {
    if (!APP.currentItem || !APP.session) return;
    const response = collectResponse();
    if (APP.currentItem.mode === 'choose' && response === '') {
      alert('Choose one answer first.');
      return;
    }
    if (APP.currentItem.mode !== 'choose' && normalizeText(response) === '') {
      alert('Type your answer first.');
      return;
    }

    const item = APP.currentItem;
    const result = evaluateResponse(item, response);
    const profile = activeProfile();
    updateScheduling(profile, item, result);
    logAttempt(profile, item, response, result);
    saveDB();

    APP.session.answeredCount += 1;
    if (result.correct) APP.session.correctCount += 1;
    APP.session.modeCounts = APP.session.modeCounts || {};
    APP.session.modeCounts[item.mode] = (APP.session.modeCounts[item.mode] || 0) + 1;
    rememberSessionItem(item);

    if (APP.session.mode === 'gps') {
      APP.session.responses.push({ itemId: item.id, response, result, renderOptions: APP.renderOptions ? APP.renderOptions.slice() : null });
      APP.draftResponse = { itemId: item.id, value: response };
      nextQuestion();
      return;
    }

    APP.draftResponse = { itemId: item.id, value: response };
    APP.feedback = { response, result, item };
    render();
  }

  function skipCurrent() {
    if (!APP.currentItem || !APP.session) return;
    const profile = activeProfile();
    const state = ensureItemState(profile, APP.currentItem.id);
    state.dueAt = now() + 10 * MIN_MS;
    saveDB();
    nextQuestion();
  }

  function resetCurrentInput() {
    if (!APP.currentItem) return;
    if (APP.currentItem.mode === 'choose') {
      $$('input[name="choice"]').forEach(radio => { radio.checked = false; });
      const first = $('input[name="choice"]');
      if (first) first.focus();
      APP.draftResponse = { itemId: APP.currentItem.id, value: '' };
      return;
    }
    const editor = byId('responseEditor');
    if (!editor) return;
    editor.value = currentInputSeed(APP.currentItem);
    APP.draftResponse = { itemId: APP.currentItem.id, value: editor.value };
    focusResponseControl();
  }

  function insertIntoAnswer(kind) {
    const editor = byId('responseEditor');
    if (!editor || editor.disabled) return;
    const start = editor.selectionStart;
    const end = editor.selectionEnd;
    const value = editor.value;
    const selected = value.slice(start, end);
    let insertText = kind;
    let caretStart = start + String(insertText).length;
    let caretEnd = caretStart;
    if (kind === 'quote') {
      insertText = `"${selected}"`;
      caretStart = caretEnd = selected ? start + insertText.length : start + 1;
    } else if (kind === 'bracket') {
      insertText = `(${selected})`;
      caretStart = caretEnd = selected ? start + insertText.length : start + 1;
    } else if (kind === 'dash') {
      insertText = ' — ';
    } else if (kind === 'bullet') {
      insertText = selected ? `• ${selected}` : '• ';
      caretStart = caretEnd = start + insertText.length;
    } else if (kind === 'apos') {
      insertText = "'";
    }
    editor.value = value.slice(0, start) + insertText + value.slice(end);
    APP.draftResponse = { itemId: APP.currentItem.id, value: editor.value };
    editor.focus();
    editor.setSelectionRange(caretStart, caretEnd);
  }

  function runLocalFreshPractice() {
    const targetSkillId = (APP.feedback && APP.feedback.item && APP.feedback.item.skillIds[0]) || getWeakSkillIds(activeProfile(), 1)[0] || 'sentence_endings';
    const added = maybeTopUpGeneratedItems(activeProfile(), {
      skillIds: [targetSkillId],
      forceCount: 10,
      minimumStock: 0,
      allowWhenDisabled: true
    });
    APP.aiMessage = added ? `Added ${added} fresh locally generated items for ${SKILL_BY_ID[targetSkillId].name}.` : 'The local generator already has plenty of fresh items ready for this skill.';
    saveDB();
    render();
  }

  // =============================
  // AI helpers
  // =============================
  function buildAIPrompt(taskName, payload) {
    if (taskName === 'explainMistake') {
      return [
        'Explain this punctuation mistake for a KS2 learner in England.',
        'Use 3 very short paragraphs:',
        '1) what the learner needed to notice,',
        '2) what to fix,',
        '3) one tiny memory tip.',
        '',
        `Prompt: ${payload.prompt}`,
        `Original sentence or task: ${payload.stem || ''}`,
        `Learner response: ${payload.response}`,
        `Model answer: ${payload.expected}`,
        `Skill: ${payload.skill}`
      ].join('\n');
    }
    if (taskName === 'generateContextPack') {
      return [
        'Return strict JSON only.',
        'The app will NOT accept finished questions, answers, or mark schemes.',
        'You are only supplying safe vocabulary and context ingredients for a local punctuation compiler.',
        'Keep everything age-appropriate, school-safe, and useful for England KS2 punctuation.',
        'Schema:',
        '{"names":["..."],"places":["..."],"listItems":["..."],"frontedAdverbials":["..."],"speechCommands":["..."],"speechQuestions":["..."],"parenthesisPhrases":["..."],"stems":["..."],"compounds":[{"plain":"old fashioned","hyphen":"old-fashioned","tail":"costumes"}]}',
        'Rules:',
        '- 4 to 6 items per array only.',
        '- No finished punctuation questions and no explanations.',
        '- No quotes, commas, colons, semicolons, dashes, or sentence-ending punctuation inside the strings.',
        '- names: capitalised first names only.',
        '- listItems and parenthesisPhrases: lower-case noun phrases only.',
        '- frontedAdverbials: capitalised phrase with no comma.',
        '- speechCommands and speechQuestions: plain words only, no final punctuation.',
        '- stems: sentence stems only, with no final punctuation.',
        '- compounds: plain must match hyphen after replacing the space with a hyphen.',
        `Weakest skills right now: ${payload.weakSkills.join(', ')}`
      ].join('\n');
    }
    return JSON.stringify(payload, null, 2);
  }

  function extractJson(text) {
    const match = String(text || '').match(/\{[\s\S]*\}/);
    if (!match) throw new Error('The provider did not return JSON.');
    return match[0];
  }

  async function callAI(taskName, payload) {
    const cfg = loadAIConfig();
    if (!cfg.apiKey || !cfg.model || !cfg.provider || cfg.provider === 'off') throw new Error('Add an API key and model in Settings before using AI.');

    const system = [
      'You are helping a KS2 punctuation practice app for England.',
      'Return concise, safe, child-friendly output only.',
      'Never mention that you are an AI assistant.',
      'Keep explanations specific and actionable.'
    ].join(' ');

    if (cfg.provider === 'openai') {
      const response = await fetch('https://api.openai.com/v1/chat/completions', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${cfg.apiKey}`
        },
        body: JSON.stringify({
          model: cfg.model,
          temperature: 0.35,
          messages: [
            { role: 'system', content: system },
            { role: 'user', content: buildAIPrompt(taskName, payload) }
          ]
        })
      });
      if (!response.ok) throw new Error(`OpenAI error ${response.status}`);
      const data = await response.json();
      return data.choices?.[0]?.message?.content?.trim() || '';
    }

    if (cfg.provider === 'anthropic') {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': cfg.apiKey,
          'anthropic-version': '2023-06-01'
        },
        body: JSON.stringify({
          model: cfg.model,
          max_tokens: 600,
          temperature: 0.35,
          system,
          messages: [{ role: 'user', content: buildAIPrompt(taskName, payload) }]
        })
      });
      if (!response.ok) throw new Error(`Anthropic error ${response.status}`);
      const data = await response.json();
      return data.content?.map(part => part.text || '').join('\n').trim() || '';
    }

    if (cfg.provider === 'gemini') {
      const endpoint = `https://generativelanguage.googleapis.com/v1beta/models/${encodeURIComponent(cfg.model)}:generateContent?key=${encodeURIComponent(cfg.apiKey)}`;
      const response = await fetch(endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          contents: [{ role: 'user', parts: [{ text: `${system}\n\n${buildAIPrompt(taskName, payload)}` }] }],
          generationConfig: { temperature: 0.35 }
        })
      });
      if (!response.ok) throw new Error(`Gemini error ${response.status}`);
      const data = await response.json();
      return data.candidates?.[0]?.content?.parts?.map(part => part.text || '').join('\n').trim() || '';
    }

    throw new Error('Unknown provider.');
  }

  async function runAIExplain() {
    if (!APP.feedback || !APP.feedback.item) return;
    const item = APP.feedback.item;
    const firstSkill = item.skillIds[0];
    APP.aiMessage = 'Working...';
    render();
    try {
      const text = await callAI('explainMistake', {
        prompt: item.prompt,
        stem: item.stem,
        response: APP.feedback.response,
        expected: APP.feedback.result.expected,
        skill: SKILL_BY_ID[firstSkill].name
      });
      APP.aiMessage = text || 'No explanation returned.';
    } catch (err) {
      APP.aiMessage = `AI failed. ${err.message}. The core app still works fully without AI. Direct browser API calls can fail because of CORS, endpoint policy, or key restrictions.`;
    }
    render();
  }

  async function runAIContextPack() {
    APP.aiMessage = 'Working...';
    render();
    try {
      const text = await callAI('generateContextPack', { weakSkills: getWeakSkillIds(activeProfile(), 4).map(id => SKILL_BY_ID[id].name) });
      const parsed = JSON.parse(extractJson(text));
      const { pack, summary } = validateContextPackStrict(parsed);
      mergeContextPackIntoProfile(pack, activeProfile());
      maybeTopUpGeneratedItems(activeProfile(), { forceCount: 20, skillIds: SKILLS.map(skill => skill.id), minimumStock: 0, allowWhenDisabled: true });
      saveDB();
      APP.aiMessage = `AI context pack accepted. Added ${summary.accepted} validated entries and rejected ${summary.rejected}. The local generator will compile those atoms into fresh questions without letting the model mark punctuation.`;
    } catch (err) {
      APP.aiMessage = `AI failed. ${err.message}. The built-in deterministic generators are still ready to produce fresh practice.`;
    }
    render();
  }

            <div class="notice small">Exports include learner progress, settings, analytics logs, and profiles. API keys are excluded.</div>
            <div class="controls">
              <button class="primary" id="exportAllBtn">Export all data</button>
              <button class="secondary" id="exportProfileBtn">Export active profile</button>
            </div>
            <div class="hr"></div>
            <label class="small"><strong>Import JSON</strong></label>
            <textarea class="textarea" id="importBox" placeholder="Paste exported JSON here"></textarea>
            <div class="controls">
              <button class="primary" id="importBtn">Import JSON</button>
            </div>
          </div>
        </div>

        <div class="card">
          <h2 class="section-title">Active learner notes</h2>
          <textarea class="textarea" id="profileNotes">${escapeHtml(profile.notes || '')}</textarea>
          <div class="controls">
            <button class="secondary" id="saveNotesBtn">Save notes</button>
          </div>
        </div>
      </div>
    `;
  }

  function renderSettingsView() {
    const ai = loadAIConfig();
    const analytics = computeAnalytics(activeProfile());
    return `
      <div class="stack">
        <div class="two-col">
          <div class="card">
            <h2 class="section-title">Practice settings</h2>
            <div class="stack">
              <label class="row"><span class="small" style="min-width:170px;">Daily target</span><input id="dailyGoalInput" type="number" min="5" max="40" value="${APP.db.settings.dailyGoal}"></label>
              <label class="row"><span class="small" style="min-width:170px;">GPS test length</span><input id="testLengthInput" type="number" min="5" max="20" value="${APP.db.settings.testLength}"></label>
              <label class="row"><span class="small" style="min-width:170px;">Font scale</span><input id="fontScaleInput" type="range" min="0.9" max="1.2" step="0.05" value="${APP.db.settings.fontScale}"><span class="badge">${APP.db.settings.fontScale.toFixed(2)}x</span></label>
              <label class="row"><input id="speechEnabledInput" type="checkbox" ${APP.db.settings.speechEnabled ? 'checked' : ''}><span class="small">Enable minimal browser speech support</span></label>
              <label class="row"><input id="autoReadInput" type="checkbox" ${APP.db.settings.autoReadPrompt ? 'checked' : ''}><span class="small">Auto-read each prompt aloud</span></label>
              <label class="row"><span class="small" style="min-width:170px;">Speech rate</span><input id="speechRateInput" type="range" min="0.7" max="1.3" step="0.05" value="${APP.db.settings.speechRate}"><span class="badge">${Number(APP.db.settings.speechRate).toFixed(2)}</span></label>
              <label class="row"><input id="showSelfCheckInput" type="checkbox" ${APP.db.settings.showSelfCheck ? 'checked' : ''}><span class="small">Show the silent self-check prompt</span></label>
              <label class="row"><input id="showKeyboardHintsInput" type="checkbox" ${APP.db.settings.showKeyboardHints ? 'checked' : ''}><span class="small">Show keyboard shortcut hints</span></label>
              <label class="row"><input id="autoGenerateInput" type="checkbox" ${APP.db.settings.autoGenerateItems ? 'checked' : ''}><span class="small">Keep the built-in generator stock topped up automatically</span></label>
            </div>
            <div class="controls">
              <button class="primary" id="saveSettingsBtn">Save settings</button>
              <button class="secondary" id="topUpLocalBtn">Top up local generated items</button>
            </div>
            <div class="small subtle" style="margin-top:10px;">Generated stock: ${analytics.generatedItemCount} items. Context packs: ${analytics.contextPackCount}.</div>
          </div>

          <div class="card">
            <h2 class="section-title">Optional AI</h2>
            <div class="notice small">This app works fully without AI. The safest use of AI here is not asking the model to mark punctuation. Instead, the model can explain mistakes and propose tightly constrained vocabulary and context packs. The local app then builds and marks the actual questions deterministically.</div>
            <div class="stack" style="margin-top:12px;">
              <label class="row"><span class="small" style="min-width:120px;">Provider</span><select id="aiProviderInput"><option value="off" ${ai.provider === 'off' ? 'selected' : ''}>AI off</option><option value="openai" ${ai.provider === 'openai' ? 'selected' : ''}>OpenAI</option><option value="anthropic" ${ai.provider === 'anthropic' ? 'selected' : ''}>Anthropic</option><option value="gemini" ${ai.provider === 'gemini' ? 'selected' : ''}>Google Gemini</option></select></label>
              <label class="row"><span class="small" style="min-width:120px;">Model</span><input id="aiModelInput" type="text" value="${escapeHtml(ai.model || '')}" placeholder="e.g. gpt-4.1-mini or gemini-2.5-flash"></label>
              <label class="row"><span class="small" style="min-width:120px;">API key</span><input id="aiKeyInput" type="password" value="${escapeHtml(ai.apiKey || '')}" placeholder="Paste key"></label>
              <label class="row"><input id="aiRememberInput" type="checkbox" ${ai.rememberKey ? 'checked' : ''}><span class="small">Remember key on this device</span></label>
            </div>
            <div class="controls">
              <button class="primary" id="saveAISettingsBtn">Save AI settings</button>
              <button class="ghost" id="clearAISettingsBtn">Clear AI key</button>
              <button class="secondary" id="aiContextPackBtn">Generate AI context pack</button>
              <button class="ghost" id="clearContextBtn">Clear added context words</button>
            </div>
            ${APP.aiMessage ? `<div class="ai-box"><strong>Helper:</strong><div class="small" style="margin-top:8px; white-space: pre-wrap;">${escapeHtml(APP.aiMessage)}</div></div>` : ''}
          </div>
        </div>
      </div>
    `;
  }

  function renderAboutView() {
    return `
      <div class="stack">
        <div class="card">
          <h2 class="section-title">Skill map</h2>
          <div class="skill-map">
            ${SKILLS.map(skill => `
              <div class="skill-card">
                <h4>${escapeHtml(skill.name)}</h4>
                <div class="tiny muted">${escapeHtml(skill.phase)}</div>
                <div class="small" style="margin-top:8px;">${escapeHtml(skill.rule)}</div>
                <div class="tiny muted" style="margin-top:8px;">Prerequisites: ${skill.prereq.length ? skill.prereq.map(id => SKILL_BY_ID[id].name).join(' → ') : 'None'}</div>
              </div>
            `).join('')}
          </div>
        </div>

        <div class="two-col">
          <div class="card">
            <h2 class="section-title">How the learning loop works</h2>
            <div class="small subtle">Smart review uses weighted random selection with due-item priority, weakness weighting, recent-miss recycling, under-secured skill boosting and repeat penalties. The aim is clean mixed review, not predictable fixed-order practice.</div>
          </div>
          <div class="card">
            <h2 class="section-title">How the code is structured now</h2>
            <div class="small subtle">This refactor folds the historical patch layers into one core: one runtime state object, one render pipeline, one event layer, one scheduler, one analytics engine, one AI adapter, and one deterministic generator registry. That makes future extension less fragile.</div>
          </div>
        </div>
      </div>
    `;
  }

  function renderView() {
    const root = byId('view');
    if (APP.view === 'practice') root.innerHTML = renderPracticeView();
    if (APP.view === 'dashboard') root.innerHTML = renderDashboardView();
    if (APP.view === 'data') root.innerHTML = renderDataView();
    if (APP.view === 'settings') root.innerHTML = renderSettingsView();
    if (APP.view === 'about') root.innerHTML = renderAboutView();
  }

  function renderShortcutOverlay() {
    const host = byId('shortcutHost');
    if (!host) return;
    host.innerHTML = `
      <div id="shortcutBackdrop" class="shortcut-backdrop ${APP.shortcutsOpen ? '' : 'hidden'}">
        <div class="shortcut-dialog" role="dialog" aria-modal="true" aria-labelledby="shortcutTitle">
          <div class="row" style="justify-content:space-between; align-items:center; margin-bottom:12px;">
            <div>
              <h2 id="shortcutTitle" class="section-title" style="margin-bottom:4px;">Keyboard and editing shortcuts</h2>
              <div class="small subtle">Use the app quickly without reducing the real punctuation thinking.</div>
            </div>
            <button class="ghost" type="button" data-shortcut-close>Close</button>
          </div>
          <div class="shortcut-grid">
            <div class="shortcut-block">
              <h3>Move through practice</h3>
              <div class="shortcut-list">
                <div class="shortcut-row"><span><kbd>Ctrl</kbd> + <kbd>Enter</kbd></span><span>Check answer</span></div>
                <div class="shortcut-row"><span><kbd>Enter</kbd></span><span>Check or go next when focus is not in the answer box</span></div>
                <div class="shortcut-row"><span><kbd>Alt</kbd> + <kbd>N</kbd></span><span>Next question after feedback</span></div>
                <div class="shortcut-row"><span><kbd>Alt</kbd> + <kbd>S</kbd></span><span>Skip for now</span></div>
                <div class="shortcut-row"><span><kbd>Esc</kbd></span><span>Reset the current answer</span></div>
                <div class="shortcut-row"><span><kbd>/</kbd></span><span>Focus the answer box</span></div>
                <div class="shortcut-row"><span><kbd>1</kbd>–<kbd>4</kbd></span><span>Select an option in choose mode</span></div>
              </div>
            </div>
            <div class="shortcut-block">
              <h3>Fast punctuation inserts</h3>
              <div class="shortcut-list">
                <div class="shortcut-row"><span><kbd>Alt</kbd> + <kbd>Q</kbd></span><span>Wrap the selection in quotes</span></div>
                <div class="shortcut-row"><span><kbd>Alt</kbd> + <kbd>B</kbd></span><span>Wrap the selection in brackets</span></div>
                <div class="shortcut-row"><span><kbd>Alt</kbd> + <kbd>D</kbd></span><span>Insert an em dash</span></div>
                <div class="shortcut-row"><span><kbd>Alt</kbd> + <kbd>L</kbd></span><span>Insert a bullet point</span></div>
                <div class="shortcut-row"><span><kbd>?</kbd></span><span>Open or close this shortcut sheet when you are not typing</span></div>
              </div>
              <div class="shortcut-footer">The text-area shortcuts are helpers only. They do not mark the work or reveal the answer.</div>
            </div>
          </div>
        </div>
      </div>
    `;
  }

  function toggleShortcuts(force) {
    APP.shortcutsOpen = typeof force === 'boolean' ? force : !APP.shortcutsOpen;
    renderShortcutOverlay();
  }

  function ensureShortcutLaunchButton() {
    const actions = $('.top-actions');
    if (actions && !byId('shortcutLaunchBtn')) {
      const btn = document.createElement('button');
      btn.className = 'ghost shortcut-launch';
      btn.id = 'shortcutLaunchBtn';
      btn.type = 'button';
      btn.textContent = 'Shortcuts';
      actions.appendChild(btn);
    }
  }

  function render() {
    stashCurrentDraft();
    applyFontScale();
    renderTabs();
    renderProfileSelect();
    renderView();
    ensureShortcutLaunchButton();
    renderShortcutOverlay();
  }

  // =============================
  // Profile and data actions
  // =============================
  function createNewProfileFlow() {
    const name = prompt('New learner name:');
    if (!name) return;
    const profile = createProfile(name.trim() || 'Learner');
    APP.db.profiles.push(profile);
    APP.db.activeProfileId = profile.id;
    APP.session = null;
    APP.currentItem = null;
    APP.feedback = null;
    stopTimer();
    saveDB();
    render();
  }

  function renameActiveProfileFlow() {
    const profile = activeProfile();
    const name = prompt('Rename learner:', profile.name);
    if (!name) return;
    profile.name = name.trim() || profile.name;
    saveDB();
    render();
  }

  function exportData(kind = 'all') {
    const payload = kind === 'profile'
      ? { version: VERSION, type: 'profile', profile: activeProfile() }
      : { version: VERSION, type: 'all', data: APP.db };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const link = document.createElement('a');
    link.href = url;
    link.download = kind === 'profile' ? `ks2-punctuation-profile-${activeProfile().name.replace(/\s+/g, '-').toLowerCase()}.json` : 'ks2-punctuation-data.json';
    link.click();
    URL.revokeObjectURL(url);
  }

  function importDataFromText(text) {
    try {
      const parsed = JSON.parse(text);
      stopTimer();
      APP.session = null;
      APP.currentItem = null;
      APP.feedback = null;
      APP.aiMessage = '';
      APP.draftResponse = { itemId: null, value: '' };
      APP.renderOptions = null;

      if (parsed.type === 'profile' && parsed.profile) {
        const incoming = migrateDB({ profiles: [parsed.profile], activeProfileId: parsed.profile.id, settings: APP.db.settings }).profiles[0];
        const existingIndex = APP.db.profiles.findIndex(profile => profile.id === incoming.id);
        if (existingIndex >= 0) APP.db.profiles[existingIndex] = incoming;
        else APP.db.profiles.push(incoming);
        APP.db.activeProfileId = incoming.id;
      } else if (parsed.type === 'all' && parsed.data) {
        APP.db = migrateDB(parsed.data);
      } else {
        throw new Error('Unrecognised export format.');
      }

      saveDB();
      render();
      alert('Import complete.');
    } catch (err) {
      alert(`Import failed: ${err.message}`);
    }
  }

  // =============================
  // Event handling
  // =============================
  function handleClick(event) {
    const target = event.target.closest('button, [data-mode], [data-tab], [data-activate-profile], [data-delete-profile], [data-shortcut-close], [data-pad]');
    if (!target) {
      const backdrop = event.target.closest('#shortcutBackdrop');
      if (backdrop && event.target.id === 'shortcutBackdrop') toggleShortcuts(false);
      return;
    }

    if (target.matches('[data-tab]')) {
      APP.view = target.dataset.tab;
      render();
      return;
    }

    if (target.matches('[data-mode]')) {
      beginSession(target.dataset.mode);
      return;
    }

    if (target.matches('[data-pad]')) {
      insertIntoAnswer(target.dataset.pad);
      return;
    }

    if (target.matches('[data-shortcut-close]')) {
      toggleShortcuts(false);
      return;
    }

    if (target.matches('[data-activate-profile]')) {
      APP.db.activeProfileId = target.dataset.activateProfile;
      APP.session = null;
      APP.currentItem = null;
      APP.feedback = null;
      APP.aiMessage = '';
      APP.draftResponse = { itemId: null, value: '' };
      stopTimer();
      saveDB();
      render();
      return;
    }

    if (target.matches('[data-delete-profile]')) {
      const id = target.dataset.deleteProfile;
      const profile = APP.db.profiles.find(row => row.id === id);
      if (!profile) return;
      if (!confirm(`Delete profile "${profile.name}"?`)) return;
      APP.db.profiles = APP.db.profiles.filter(row => row.id !== id);
      if (APP.db.activeProfileId === id) APP.db.activeProfileId = APP.db.profiles[0].id;
      APP.session = null;
      APP.currentItem = null;
      APP.feedback = null;
      stopTimer();
      saveDB();
      render();
      return;
    }

    switch (target.id) {
      case 'newProfileQuickBtn': createNewProfileFlow(); break;
      case 'exportQuickBtn': exportData('profile'); break;
      case 'restartGuidedBtn': beginSession('guided', { skillId: byId('guidedSkillSelect').value }); break;
      case 'submitBtn': submitCurrent(); break;
      case 'nextBtn': nextQuestion(); break;
      case 'skipBtn': skipCurrent(); break;
      case 'resetBtn': resetCurrentInput(); break;
      case 'speakBtn': if (APP.currentItem) speakText(`${APP.currentItem.prompt} ${APP.currentItem.stem || ''}`); break;
      case 'freshPracticeBtn': runLocalFreshPractice(); break;
      case 'aiExplainBtn': runAIExplain(); break;
      case 'restartSmartBtn': beginSession('smart'); break;
      case 'restartGpsBtn': beginSession('gps'); break;
      case 'newProfileBtn': createNewProfileFlow(); break;
      case 'renameProfileBtn': renameActiveProfileFlow(); break;
      case 'resetProfileBtn': {
        if (!confirm('Reset all progress for the active learner?')) return;
        const fresh = createProfile(activeProfile().name);
        const profile = activeProfile();
        profile.itemStates = {};
        profile.facetStates = {};
        profile.attemptLog = [];
        profile.notes = '';
        profile.customItems = [];
        profile.lexiconAdds = fresh.lexiconAdds;
        profile.generatedStats = fresh.generatedStats;
        saveDB();
        APP.session = null;
        APP.currentItem = null;
        APP.feedback = null;
        render();
        break;
      }
      case 'exportAllBtn': exportData('all'); break;
      case 'exportProfileBtn': exportData('profile'); break;
      case 'importBtn': {
        const text = byId('importBox').value.trim();
        if (!text) { alert('Paste JSON first.'); return; }
        importDataFromText(text);
        break;
      }
      case 'saveNotesBtn': {
        activeProfile().notes = byId('profileNotes').value;
        saveDB();
        alert('Notes saved.');
        break;
      }
      case 'saveSettingsBtn': {
        APP.db.settings.dailyGoal = clamp(parseInt(byId('dailyGoalInput').value, 10) || 12, 5, 40);
        APP.db.settings.testLength = clamp(parseInt(byId('testLengthInput').value, 10) || 10, 5, 20);
        APP.db.settings.fontScale = clamp(parseFloat(byId('fontScaleInput').value) || 1, 0.9, 1.2);
        APP.db.settings.speechEnabled = byId('speechEnabledInput').checked;
        APP.db.settings.autoReadPrompt = byId('autoReadInput').checked;
        APP.db.settings.speechRate = clamp(parseFloat(byId('speechRateInput').value) || 1, 0.7, 1.3);
        APP.db.settings.showSelfCheck = byId('showSelfCheckInput').checked;
        APP.db.settings.showKeyboardHints = byId('showKeyboardHintsInput').checked;
        APP.db.settings.autoGenerateItems = byId('autoGenerateInput').checked;
        saveDB();
        render();
        alert('Settings saved.');
        break;
      }
      case 'topUpLocalBtn': {
        const added = maybeTopUpGeneratedItems(activeProfile(), { forceCount: 24, skillIds: SKILLS.map(skill => skill.id), minimumStock: 0, allowWhenDisabled: true });
        render();
        alert(added ? `Added ${added} fresh generated items.` : 'Generated stock already looks healthy.');
        break;
      }
      case 'saveAISettingsBtn': {
        saveAIConfig({
          provider: byId('aiProviderInput').value,
          model: byId('aiModelInput').value.trim(),
          apiKey: byId('aiKeyInput').value.trim(),
          rememberKey: byId('aiRememberInput').checked
        });
        render();
        alert('AI settings saved.');
        break;
      }
      case 'clearAISettingsBtn': {
        localStorage.removeItem(AI_LOCAL_KEY);
        sessionStorage.removeItem(AI_SESSION_KEY);
        render();
        alert('AI settings cleared.');
        break;
      }
      case 'aiContextPackBtn': runAIContextPack(); break;
      case 'clearContextBtn': clearAddedContext(); render(); break;
      case 'shortcutLaunchBtn': toggleShortcuts(); break;
    }
  }

  function handleChange(event) {
    if (event.target.id === 'profileSelect') {
      APP.db.activeProfileId = event.target.value;
      APP.session = null;
      APP.currentItem = null;
      APP.feedback = null;
      APP.aiMessage = '';
      APP.draftResponse = { itemId: null, value: '' };
      stopTimer();
      saveDB();
      render();
    }
  }

  function handleKeydown(event) {
    const overlayOpen = APP.shortcutsOpen;
    const active = document.activeElement;
    const isTyping = isTextEditingElement(active);
    const isEditor = active && active.id === 'responseEditor';
    const inPractice = APP.view === 'practice';

    if (!isTyping && event.key === '?') {
      event.preventDefault();
      toggleShortcuts();
      return;
    }
    if (overlayOpen && event.key === 'Escape') {
      event.preventDefault();
      toggleShortcuts(false);
      return;
    }
    if (isEditor && event.altKey) {
      const key = event.key.toLowerCase();
      if (key === 'q') { event.preventDefault(); insertIntoAnswer('quote'); return; }
      if (key === 'b') { event.preventDefault(); insertIntoAnswer('bracket'); return; }
      if (key === 'd') { event.preventDefault(); insertIntoAnswer('dash'); return; }
      if (key === 'l') { event.preventDefault(); insertIntoAnswer('bullet'); return; }
    }
    if (!inPractice) return;

    if ((event.ctrlKey || event.metaKey) && event.key === 'Enter' && APP.currentItem && APP.session && APP.session.mode !== 'gps' && !APP.feedback) {
      event.preventDefault();
      submitCurrent();
      return;
    }
    if (!isTyping && event.key === '/') {
      event.preventDefault();
      focusResponseControl();
      return;
    }
    if (!isTyping && APP.currentItem && APP.currentItem.mode === 'choose' && /^[1-4]$/.test(event.key)) {
      const radios = $$('input[name="choice"]');
      const radio = radios[Number(event.key) - 1];
      if (radio) {
        radio.checked = true;
        radio.focus();
        event.preventDefault();
      }
    }
    if (event.altKey) {
      const key = event.key.toLowerCase();
      if (key === 'n') {
        event.preventDefault();
        if (APP.feedback) nextQuestion();
      } else if (key === 's') {
        event.preventDefault();
        if (!APP.feedback) skipCurrent();
      } else if (key === 'r') {
        event.preventDefault();
        resetCurrentInput();
      }
    }
    if (event.key === 'Escape' && APP.currentItem && APP.session && APP.session.mode !== 'gps' && !APP.feedback) {
      event.preventDefault();
      resetCurrentInput();
      return;
    }
    if (!isTyping && event.key === 'Enter' && APP.currentItem && APP.session && APP.session.mode !== 'gps') {
      event.preventDefault();
      if (APP.feedback) nextQuestion();
      else submitCurrent();
    }
  }

  // =============================
  // Init
  // =============================
  function init() {
    APP.db = loadDB();
    maybeTopUpGeneratedItems(activeProfile(), { forceCount: 36, skillIds: SKILLS.map(skill => skill.id) });
    render();
    document.addEventListener('click', handleClick);
    document.addEventListener('change', handleChange);
    document.addEventListener('keydown', handleKeydown);
  }

  init();
})();
</script>
</body>
</html>
