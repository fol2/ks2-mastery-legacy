<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>KS2 Punctuation Mastery</title>
<style>
  :root{
    --bg:#f5f7fb;
    --card:#ffffff;
    --ink:#1e2430;
    --muted:#5d687a;
    --line:#dfe5ef;
    --accent:#2b6ee7;
    --accent-2:#6b46c1;
    --good:#1f8a4d;
    --bad:#c0392b;
    --warn:#b9770e;
    --chip:#eef3ff;
    --shadow:0 10px 24px rgba(15, 23, 42, 0.08);
    --radius:16px;
    --radius-sm:10px;
    --font-scale:1;
  }

  * { box-sizing: border-box; }
  html { font-size: calc(16px * var(--font-scale)); }
  body {
    margin: 0;
    font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 200px);
    color: var(--ink);
  }

  button, input, select, textarea {
    font: inherit;
  }

  .app {
    max-width: 1240px;
    margin: 0 auto;
    padding: 18px;
  }

  .topbar {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 16px 18px;
    display: grid;
    grid-template-columns: 1.7fr 1fr;
    gap: 16px;
    align-items: center;
  }

  .brand h1 {
    margin: 0 0 6px;
    font-size: 1.45rem;
    line-height: 1.2;
  }

  .brand p {
    margin: 0;
    color: var(--muted);
    font-size: 0.96rem;
  }

  .top-actions {
    display: flex;
    justify-content: flex-end;
    gap: 10px;
    flex-wrap: wrap;
    align-items: center;
  }

  .select-wrap,
  .inline-input {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: #f8fafc;
    border: 1px solid var(--line);
    border-radius: 999px;
    padding: 8px 12px;
  }

  .select-wrap select,
  .inline-input input {
    border: none;
    background: transparent;
    min-width: 120px;
    outline: none;
  }

  .tabs {
    margin: 16px 0;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .tab {
    border: 1px solid var(--line);
    background: var(--card);
    color: var(--ink);
    padding: 10px 14px;
    border-radius: 999px;
    cursor: pointer;
    font-weight: 600;
  }

  .tab.active {
    background: var(--accent);
    color: #fff;
    border-color: var(--accent);
  }

  .grid {
    display: grid;
    gap: 16px;
  }

  .grid.practice {
    grid-template-columns: 290px 1fr;
    align-items: start;
  }

  .panel, .card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
  }

  .panel {
    padding: 16px;
  }

  .card {
    padding: 18px;
  }

  .section-title {
    margin: 0 0 12px;
    font-size: 1.02rem;
  }

  .muted {
    color: var(--muted);
  }

  .small {
    font-size: 0.92rem;
  }

  .tiny {
    font-size: 0.83rem;
  }

  .stack {
    display: grid;
    gap: 12px;
  }

  .mode-list {
    display: grid;
    gap: 10px;
  }

  .mode-btn {
    border: 1px solid var(--line);
    background: #fff;
    border-radius: 14px;
    padding: 12px 14px;
    text-align: left;
    cursor: pointer;
    display: grid;
    gap: 4px;
  }

  .mode-btn.active {
    border-color: var(--accent);
    background: #f3f7ff;
    box-shadow: 0 0 0 3px rgba(43, 110, 231, 0.08) inset;
  }

  .mode-btn strong {
    font-size: 0.98rem;
  }

  .mode-btn span {
    color: var(--muted);
    font-size: 0.9rem;
    line-height: 1.35;
  }

  .chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip {
    display: inline-flex;
    gap: 6px;
    align-items: center;
    border-radius: 999px;
    padding: 6px 10px;
    background: var(--chip);
    color: #28407a;
    font-size: 0.88rem;
    border: 1px solid #dce7ff;
  }

  .chip.good {
    background: #eaf8f0;
    color: #17633a;
    border-color: #cdeed9;
  }

  .chip.bad {
    background: #fff0ef;
    color: #9f2f24;
    border-color: #ffd8d4;
  }

  .chip.warn {
    background: #fff8e8;
    color: #845b07;
    border-color: #f9e3ad;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .stat {
    padding: 14px;
    border-radius: 14px;
    background: #f8fafc;
    border: 1px solid var(--line);
  }

  .stat .num {
    font-size: 1.5rem;
    font-weight: 700;
    margin-top: 4px;
  }

  .question-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
    flex-wrap: wrap;
    margin-bottom: 12px;
  }

  .question-prompt {
    font-size: 1.08rem;
    line-height: 1.45;
    margin-bottom: 12px;
  }

  .question-stem {
    padding: 14px;
    border: 1px dashed #cdd7e8;
    background: #fbfcff;
    border-radius: 14px;
    line-height: 1.55;
    min-height: 64px;
    white-space: pre-wrap;
  }

  .editor {
    margin-top: 12px;
    border: 2px solid #d6e0ef;
    background: #fff;
    border-radius: 14px;
    padding: 14px;
    min-height: 96px;
    line-height: 1.6;
    outline: none;
    white-space: pre-wrap;
  }

  .editor:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 4px rgba(43, 110, 231, 0.12);
  }

  .choices {
    display: grid;
    gap: 10px;
    margin-top: 14px;
  }

  .choice {
    display: grid;
    grid-template-columns: auto 1fr;
    gap: 10px;
    align-items: start;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
  }

  .choice.correct {
    border-color: #b6e2c8;
    background: #f1fbf5;
  }

  .choice span:last-child {
    white-space: pre-wrap;
  }

  .choice.incorrect {
    border-color: #f2c1bc;
    background: #fff6f5;
  }

  .controls {
    margin-top: 14px;
    display: flex;
    flex-wrap: wrap;
    gap: 10px;
  }

  button.primary,
  button.secondary,
  button.ghost,
  button.danger {
    border-radius: 12px;
    padding: 10px 14px;
    cursor: pointer;
    font-weight: 700;
    border: 1px solid transparent;
  }

  button.primary {
    background: var(--accent);
    color: #fff;
  }

  button.secondary {
    background: #eef3ff;
    color: #22408a;
    border-color: #dce7ff;
  }

  button.ghost {
    background: #fff;
    color: var(--ink);
    border-color: var(--line);
  }

  button.danger {
    background: #fff1f0;
    color: #962d22;
    border-color: #f3c7c2;
  }

  button:disabled {
    opacity: 0.58;
    cursor: not-allowed;
  }

  .feedback {
    margin-top: 16px;
    padding: 16px;
    border-radius: 16px;
    border: 1px solid var(--line);
    background: #fbfdff;
  }

  .feedback.good {
    border-color: #cfe9d8;
    background: #f2fbf5;
  }

  .feedback.bad {
    border-color: #f1c7c3;
    background: #fff6f5;
  }

  .feedback h3 {
    margin: 0 0 8px;
    font-size: 1.05rem;
  }

  .model-answer {
    margin-top: 10px;
    padding: 12px;
    background: rgba(255,255,255,0.8);
    border: 1px solid rgba(0,0,0,0.06);
    border-radius: 12px;
    white-space: pre-wrap;
  }

  .hint-box, .ai-box, .teach-box {
    margin-top: 14px;
    padding: 14px;
    border-radius: 14px;
    border: 1px solid var(--line);
    background: #f8fafc;
  }

  .teach-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
  }

  .contrast {
    padding: 12px;
    border-radius: 12px;
    background: #fff;
    border: 1px solid var(--line);
  }

  .bar-list {
    display: grid;
    gap: 12px;
  }

  .bar-row {
    display: grid;
    gap: 6px;
  }

  .bar-head {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: center;
  }

  .bar-wrap {
    height: 12px;
    background: #eef2f8;
    border-radius: 999px;
    overflow: hidden;
    border: 1px solid #dde4ef;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, #6aa8ff, #2b6ee7);
  }

  .mistake-list {
    display: grid;
    gap: 10px;
  }

  .mistake {
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
  }

  .two-col {
    display: grid;
    gap: 16px;
    grid-template-columns: 1fr 1fr;
  }

  .three-col {
    display: grid;
    gap: 16px;
    grid-template-columns: repeat(3, 1fr);
  }

  .skill-map {
    display: grid;
    gap: 10px;
  }

  .skill-card {
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 14px;
    background: #fff;
  }

  .skill-card h4 {
    margin: 0 0 6px;
    font-size: 1rem;
  }

  .row {
    display: flex;
    gap: 10px;
    align-items: center;
    flex-wrap: wrap;
  }

  .profile-list {
    display: grid;
    gap: 10px;
  }

  .profile-item {
    display: flex;
    justify-content: space-between;
    gap: 10px;
    align-items: center;
    padding: 12px 14px;
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
  }

  .profile-item.active {
    border-color: var(--accent);
    background: #f3f7ff;
  }

  .textarea {
    width: 100%;
    min-height: 160px;
    border: 1px solid var(--line);
    border-radius: 14px;
    padding: 12px;
    background: #fff;
  }

  .notice {
    padding: 12px 14px;
    border-radius: 14px;
    border: 1px solid #ead49a;
    background: #fff8e6;
    color: #6f5608;
  }

  .subtle {
    color: var(--muted);
    line-height: 1.5;
  }

  .hr {
    height: 1px;
    background: var(--line);
    margin: 10px 0;
  }

  .timer {
    font-weight: 800;
    font-variant-numeric: tabular-nums;
  }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 9px;
    border-radius: 999px;
    background: #f3f6fb;
    border: 1px solid var(--line);
    font-size: 0.85rem;
  }

  .hidden {
    display: none !important;
  }

  .footer-note {
    margin-top: 16px;
    color: var(--muted);
    font-size: 0.9rem;
  }

  @media (max-width: 980px) {
    .grid.practice,
    .two-col,
    .three-col,
    .stats-grid,
    .teach-grid {
      grid-template-columns: 1fr;
    }
    .topbar {
      grid-template-columns: 1fr;
    }
    .top-actions {
      justify-content: flex-start;
    }
  }

.editor {
  width: 100%;
  resize: vertical;
  font: inherit;
  white-space: pre-wrap;
}

.self-check {
  margin-top: 12px;
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid #dce6f5;
  background: #f8fbff;
}

.kbd-hints {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 12px;
}

.kbd-chip {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 10px;
  border-radius: 999px;
  background: #f7f9fc;
  border: 1px solid var(--line);
  color: var(--muted);
  font-size: 0.82rem;
}

kbd {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  border: 1px solid #cfd7e6;
  border-bottom-width: 2px;
  border-radius: 6px;
  background: #fff;
  padding: 1px 5px;
  color: #273247;
  font-size: 0.82rem;
}

.punct-pad {
  display: flex;
  flex-wrap: wrap;
  gap: 8px;
  margin-top: 10px;
}

.punct-btn {
  min-width: 42px;
  padding: 8px 10px !important;
  font-weight: 700;
}

.contrast-mini {
  margin-top: 10px;
  padding: 12px;
  border-radius: 12px;
  border: 1px solid #dce6f5;
  background: #fff;
}

.mini-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.mode-meter {
  display: grid;
  gap: 8px;
}

.facet-list {
  display: grid;
  gap: 10px;
}

.facet-item {
  padding: 12px 14px;
  border-radius: 14px;
  border: 1px solid var(--line);
  background: #fff;
}

.small-mono {
  font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
  font-size: 0.84rem;
}

.count-grid {
  display: grid;
  gap: 10px;
  grid-template-columns: repeat(3, minmax(0, 1fr));
}

@media (max-width: 980px) {
  .mini-grid, .count-grid {
    grid-template-columns: 1fr;
  }
}


  .shortcut-launch {
    white-space: nowrap;
  }
  .shortcut-backdrop {
    position: fixed;
    inset: 0;
    background: rgba(15, 23, 42, 0.48);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 18px;
    z-index: 9999;
  }
  .shortcut-dialog {
    width: min(860px, 100%);
    max-height: 88vh;
    overflow: auto;
    background: var(--card);
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 20px;
    box-shadow: var(--shadow);
    padding: 18px;
  }
  .shortcut-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .shortcut-block {
    border: 1px solid var(--line);
    border-radius: 14px;
    background: #fff;
    padding: 14px;
  }
  .shortcut-block h3 {
    margin: 0 0 8px;
    font-size: 1rem;
  }
  .shortcut-list {
    display: grid;
    gap: 8px;
  }
  .shortcut-row {
    display: flex;
    justify-content: space-between;
    gap: 12px;
    align-items: start;
    padding: 8px 0;
    border-bottom: 1px solid #eef2f8;
  }
  .shortcut-row:last-child {
    border-bottom: none;
  }
  .shortcut-row kbd, .kbd-chip kbd {
    font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    font-size: 0.83rem;
    background: #f4f7fb;
    border: 1px solid #d7e0ef;
    border-bottom-width: 2px;
    border-radius: 6px;
    padding: 2px 6px;
    color: #24344d;
  }
  .stage-strip {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 12px;
  }
  .stage-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px;
    border-radius: 999px;
    border: 1px solid #dce7ff;
    background: #f5f8ff;
    color: #24407d;
    font-size: 0.86rem;
  }
  .stage-chip.active {
    background: #edf4ff;
    border-color: #bcd0ff;
    box-shadow: 0 0 0 2px rgba(43, 110, 231, 0.08) inset;
    font-weight: 700;
  }
  .stage-note {
    margin-bottom: 12px;
    padding: 12px 14px;
    border: 1px solid #dce7ff;
    border-radius: 14px;
    background: #f8fbff;
  }
  .shortcut-footer {
    margin-top: 12px;
    color: var(--muted);
    font-size: 0.9rem;
  }
  @media (max-width: 780px) {
    .shortcut-grid {
      grid-template-columns: 1fr;
    }
  }

</style>
</head>
<body>
<div class="app" id="app">
  <div class="topbar">
    <div class="brand">
      <h1>KS2 Punctuation Mastery</h1>
      <p>Adaptive daily practice for England KS2 punctuation, built for durable mastery, transfer into real writing, and GPS-style confidence.</p>
    </div>
    <div class="top-actions">
      <div class="select-wrap">
        <label for="profileSelect" class="tiny muted">Learner</label>
        <select id="profileSelect" aria-label="Choose learner profile"></select>
      </div>
      <button class="secondary" id="newProfileQuickBtn">New profile</button>
      <button class="ghost" id="exportQuickBtn">Export</button>
    </div>
  </div>

  <div class="tabs" id="tabs"></div>

  <main id="view"></main>
<div id="shortcutHost"></div>
</div>


<script>
(() => {
  'use strict';

  // =============================
  // Core constants and data
  // =============================
  const VERSION = '1.2.0';
  const STORAGE_KEY = 'ks2_punctuation_mastery_v1';
  const AI_LOCAL_KEY = 'ks2_punctuation_ai_local_v1';
  const AI_SESSION_KEY = 'ks2_punctuation_ai_session_v1';
  const DAY_MS = 24 * 60 * 60 * 1000;
  const MIN_MS = 60 * 1000;

  const SKILLS = [
  {
    "id": "sentence_endings",
    "name": "Capital letters and sentence endings",
    "phase": "KS1 foundation, consolidated through KS2",
    "prereq": [],
    "rule": "Start each sentence with a capital letter and end it with the right mark: full stop, question mark or exclamation mark.",
    "workedBad": "where is my reading record",
    "workedGood": "Where is my reading record?",
    "contrastBad": "We won the match?",
    "contrastGood": "We won the match!"
  },
  {
    "id": "list_commas",
    "name": "Commas in lists",
    "phase": "KS2 review",
    "prereq": [
      "sentence_endings"
    ],
    "rule": "Use commas to separate items in a list. In standard KS2 examples, the final comma before 'and' is usually not needed.",
    "workedBad": "We packed torches maps and water.",
    "workedGood": "We packed torches, maps and water.",
    "contrastBad": "We packed, torches maps, and water.",
    "contrastGood": "We packed torches, maps and water."
  },
  {
    "id": "apostrophe_contractions",
    "name": "Apostrophes for contraction",
    "phase": "KS2 review",
    "prereq": [
      "sentence_endings"
    ],
    "rule": "Use an apostrophe to show missing letters in contractions, such as can't, didn't and we're.",
    "workedBad": "We cant go because were late.",
    "workedGood": "We can't go because we're late.",
    "contrastBad": "We cant go because we're late.",
    "contrastGood": "We can't go because we're late."
  },
  {
    "id": "apostrophe_possession",
    "name": "Apostrophes for possession",
    "phase": "KS2 review and extension",
    "prereq": [
      "apostrophe_contractions"
    ],
    "rule": "Use apostrophes to show belonging: the girl's coat, the girls' coats, the children's books.",
    "workedBad": "The girls coat was on the bench.",
    "workedGood": "The girl's coat was on the bench.",
    "contrastBad": "The girls coat was on the bench.",
    "contrastGood": "The girls' coats were on the bench."
  },
  {
    "id": "speech",
    "name": "Inverted commas and speech punctuation",
    "phase": "Year 3–4 core",
    "prereq": [
      "sentence_endings"
    ],
    "rule": "Put spoken words inside inverted commas. Use the correct punctuation inside the closing inverted comma when the punctuation belongs to the spoken words.",
    "workedBad": "Mia said \"Come here\".",
    "workedGood": "Mia said, \"Come here.\"",
    "contrastBad": "\"Where are you going\"? asked Zara.",
    "contrastGood": "\"Where are you going?\" asked Zara."
  },
  {
    "id": "fronted_adverbial",
    "name": "Commas after fronted adverbials",
    "phase": "Year 4 core",
    "prereq": [
      "sentence_endings"
    ],
    "rule": "Put a comma after a fronted adverbial, such as At last, Before lunch, or Without warning.",
    "workedBad": "Before lunch we finished the poster.",
    "workedGood": "Before lunch, we finished the poster.",
    "contrastBad": "Before lunch we, finished the poster.",
    "contrastGood": "Before lunch, we finished the poster."
  },
  {
    "id": "parenthesis",
    "name": "Parenthesis with commas, brackets or dashes",
    "phase": "Year 5 core",
    "prereq": [
      "fronted_adverbial"
    ],
    "rule": "Parenthesis adds extra information. It can be marked with commas, brackets or dashes.",
    "workedBad": "Mr Patel our coach arrived early.",
    "workedGood": "Mr Patel, our coach, arrived early.",
    "contrastBad": "Mr Patel our coach, arrived early.",
    "contrastGood": "Mr Patel (our coach) arrived early."
  },
  {
    "id": "comma_clarity",
    "name": "Commas for clarity",
    "phase": "Year 5 core",
    "prereq": [
      "fronted_adverbial"
    ],
    "rule": "A comma can make meaning clearer and avoid ambiguity.",
    "workedBad": "Let's eat Grandma.",
    "workedGood": "Let's eat, Grandma.",
    "contrastBad": "Most of the time travellers worry about delays.",
    "contrastGood": "Most of the time, travellers worry about delays."
  },
  {
    "id": "colon_list",
    "name": "Colon before a list",
    "phase": "Year 6 core",
    "prereq": [
      "list_commas"
    ],
    "rule": "A colon can introduce a list after a complete opening clause.",
    "workedBad": "We needed three things, a torch, a map and a whistle.",
    "workedGood": "We needed three things: a torch, a map and a whistle.",
    "contrastBad": "We needed: three things a torch, a map and a whistle.",
    "contrastGood": "We needed three things: a torch, a map and a whistle."

  // =============================
  // Generic helpers
  // =============================
  const $ = (selector, root = document) => root.querySelector(selector);
  const $$ = (selector, root = document) => Array.from(root.querySelectorAll(selector));
  const byId = id => document.getElementById(id);

  const uid = (prefix = 'id') => `${prefix}_${Math.random().toString(36).slice(2, 10)}`;
  const clamp = (n, min, max) => Math.max(min, Math.min(max, n));
  const now = () => Date.now();

  function localDayKey(ts = now()) {
    const d = new Date(ts);
    const yyyy = d.getFullYear();
    const mm = String(d.getMonth() + 1).padStart(2, '0');
    const dd = String(d.getDate()).padStart(2, '0');
    return `${yyyy}-${mm}-${dd}`;
  }

  function isTextEditingElement(el) {
    if (!el || !el.tagName) return false;
    const tag = el.tagName.toLowerCase();
    if (tag === 'textarea' || tag === 'select') return true;
    if (tag !== 'input') return false;
    const type = String(el.type || 'text').toLowerCase();
    return !['radio', 'checkbox', 'button', 'submit', 'reset', 'range', 'color', 'file'].includes(type);
  }

  function normalizeText(str) {
    return String(str || '')
      .replace(/\r/g, '')
      .replace(/[“”]/g, '"')
      .replace(/[‘’]/g, "'")
      .replace(/[–—]/g, '—')
      .replace(/\u00a0/g, ' ')
      .replace(/[ \t]+\n/g, '\n')
      .replace(/\n{3,}/g, '\n\n')
      .replace(/[ \t]{2,}/g, ' ')
      .replace(/\s+([,.;:?!\)])/g, '$1')
      .replace(/([\(\[])(\s+)/g, '$1')
      .replace(/\s*—\s*/g, ' — ')
      .replace(/[ ]{2,}/g, ' ')
      .trim();
  }

  function escapeHtml(str) {
    return String(str || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  function stripPunctuation(str) {
    return normalizeText(str).toLowerCase().replace(/[^a-z0-9'\n ]/g, ' ').replace(/\s+/g, ' ').trim();
  }

  function uniqueStrings(list) {
    return [...new Set((list || []).map(value => String(value || '').trim()).filter(Boolean))];
  }

  function titleCase(str) {
    const s = String(str || '').trim();
    return s ? s.charAt(0).toUpperCase() + s.slice(1) : s;
  }

  function randOne(list) {
    return list[Math.floor(Math.random() * list.length)];
  }

  function sampleUnique(list, count) {
    const copy = list.slice();
    const out = [];
    while (copy.length && out.length < count) {
      const index = Math.floor(Math.random() * copy.length);
      out.push(copy.splice(index, 1)[0]);
    }
    return out;
  }

  function weightedPick(options) {
    const total = options.reduce((sum, row) => sum + row.weight, 0);
    if (total <= 0) return options[0] || null;
    let roll = Math.random() * total;
    for (const row of options) {
      roll -= row.weight;
      if (roll <= 0) return row;
    }
    return options[options.length - 1] || null;
  }

  function oxfordVariants(sentence) {
    if (!sentence.includes(', and ')) return [sentence];
    return [sentence, sentence.replace(/, and /g, ' and ')];
  }

  function v3AnswerVariants(text, allowOxford = true) {
    const base = [text];
    if (allowOxford) base.push(text.replace(/, and /g, ' and '));
    const out = [];
    base.forEach(value => {
      out.push(value);
      if (value.includes('"')) out.push(value.replace(/"/g, "'"));
    });
    return uniqueStrings(out);
  }

  function buildGeneratedId(familyId) {
    return `${familyId}_${Math.random().toString(36).slice(2, 9)}`;
  }

  function buildItemSignature(item) {
    const body = [item.mode || '', item.prompt || '', item.stem || '', item.model || ''].join(' || ');
    return normalizeText(body).toLowerCase();
  }

  function formatTime(seconds) {
    const mm = String(Math.floor(seconds / 60)).padStart(2, '0');
    const ss = String(Math.floor(seconds % 60)).padStart(2, '0');
    return `${mm}:${ss}`;
  }

  function sanitizeContextEntry(value, maxLen = 48) {
    const clean = String(value || '')
      .replace(/[“”]/g, '"')
      .replace(/[‘’]/g, "'")
      .replace(/[^A-Za-z0-9 ,.'-]/g, '')
      .replace(/\s{2,}/g, ' ')
      .trim();
    if (!clean || clean.length > maxLen) return '';
    return clean;
  }

  function sanitizeCompoundEntry(entry) {
    if (!entry || typeof entry !== 'object') return null;
    const plain = sanitizeContextEntry(entry.plain, 32).toLowerCase();
    const hyphen = sanitizeContextEntry(entry.hyphen, 32).toLowerCase();
    const tail = sanitizeContextEntry(entry.tail, 24).toLowerCase();
    if (!plain || !hyphen || !tail || !hyphen.includes('-')) return null;
    return { plain, hyphen, tail };
  }

  function v5CanonicalDup(text) {
    return normalizeText(String(text || '')).toLowerCase();
  }

  function v5SentenceCase(text) {
    const value = String(text || '').trim();
    return value ? value.charAt(0).toUpperCase() + value.slice(1) : value;
  }

  function v5TitleWords(text) {
    return String(text || '').trim().split(/\s+/).filter(Boolean).map(word => word.charAt(0).toUpperCase() + word.slice(1).toLowerCase()).join(' ');
  }

  function v5CanonicalContextEntry(key, value) {
    const clean = sanitizeContextEntry(value, key === 'speechQuestions' || key === 'speechCommands' ? 72 : 48);
    if (!clean) return '';
    if (['names', 'frontedAdverbials'].includes(key)) return v5TitleWords(clean);
    if (['places', 'stems'].includes(key)) return clean.charAt(0).toUpperCase() + clean.slice(1);
    return clean.toLowerCase();
  }

  function v5UniqueCompounds(rows) {
    const seen = new Set();
    const out = [];
    (rows || []).forEach(entry => {
      const row = sanitizeCompoundEntry(entry);
      if (!row) return;
      const key = `${row.hyphen}|${row.tail}`;
      if (seen.has(key)) return;
      seen.add(key);
      out.push(row);
    });
    return out;
  }

  function v3SafePattern(key, value) {
    const wordCount = value.split(/\s+/).filter(Boolean).length;
    const unsafe = /\b(?:weapon|gun|knife|blood|drugs?|alcohol|beer|wine|cigarette|vape|kill|dead)\b/i.test(value);
    if (unsafe) return false;
    if (/[,:;!?"“”]/.test(value)) return false;
    if (key === 'names') return /^[A-Z][a-z]+(?: [A-Z][a-z]+)?$/.test(value);
    if (key === 'frontedAdverbials') return /^[A-Z][A-Za-z]+(?: [A-Za-z]+){0,5}$/.test(value) && wordCount >= 1 && wordCount <= 6;
    if (key === 'speechQuestions' || key === 'speechCommands') return /^[A-Za-z][A-Za-z' -]+$/.test(value) && wordCount >= 2 && wordCount <= 8;
    if (key === 'stems') return /^[A-Z][A-Za-z' -]+$/.test(value) && wordCount >= 3 && wordCount <= 9;
    if (key === 'listItems' || key === 'parenthesisPhrases') return /^[a-z][a-z' -]+$/.test(value) && wordCount >= 1 && wordCount <= 5;
    if (key === 'places') return /^[A-Za-z][A-Za-z' -]+$/.test(value) && wordCount >= 1 && wordCount <= 6;
    return true;
  }

  function v5HyphenSentence(row, punctuated = true, context = null) {
    const chosenContext = context || randOne(row.contexts || ['The display used']);
    const phrase = punctuated ? `${row.hyphen} ${row.tail}` : `${row.plain} ${row.tail}`;
    return `${chosenContext} ${phrase}.`;
  }

  function prod(id, mode, skillIds, prompt, stem, answers, explanation, extra = {}) {
    return {
      id,
      mode,
      skillIds,
      prompt,
      stem,
      answers: Array.isArray(answers) ? answers : [answers],
      explanation,
      satStyle: extra.satStyle !== false,
      difficulty: extra.difficulty || 2,
      hint: extra.hint || '',
      model: extra.model || (Array.isArray(answers) ? answers[0] : answers),
      validator: extra.validator || null,
      tags: extra.tags || [],
      familyId: extra.familyId || null,
      errorTags: extra.errorTags || [],
      source: extra.source || 'fixed'
    };
  }

  function choose(id, skillIds, prompt, options, correctIndex, explanation, extra = {}) {
    return {
      id,
      mode: 'choose',
      skillIds,
      prompt,
      options,
      correctIndex,
      explanation,
      satStyle: extra.satStyle !== false,
      difficulty: extra.difficulty || 2,
      hint: extra.hint || '',
      model: options[correctIndex],
      tags: extra.tags || [],
      familyId: extra.familyId || null,
      errorTags: extra.errorTags || [],
      source: extra.source || 'fixed'
    };
  }

  function hydrateCustomItem(item) {
    if (!item || !item.id || !item.mode || !Array.isArray(item.skillIds)) return null;
    if (item.mode === 'choose') {
      if (!Array.isArray(item.options) || item.options.length < 2) return null;
      return choose(item.id, item.skillIds, item.prompt || 'Choose the best punctuated sentence.', item.options, clamp(Number(item.correctIndex) || 0, 0, Math.max(0, item.options.length - 1)), item.explanation || '', item);
    }
    const answers = Array.isArray(item.answers) && item.answers.length ? item.answers : [item.model || ''];
    return prod(item.id, item.mode, item.skillIds, item.prompt || 'Type the sentence with the correct punctuation.', item.stem || '', answers, item.explanation || '', item);
  }

  function migrateDB(db) {
    const safe = {
      version: VERSION,
      settings: Object.assign(defaultSettings(), db && db.settings || {}),
      profiles: Array.isArray(db && db.profiles) && db.profiles.length ? db.profiles : [createProfile('Learner 1')],
      activeProfileId: db && db.activeProfileId || null
    };

    safe.profiles = safe.profiles.map(rawProfile => {
      const defaults = createProfile(rawProfile && rawProfile.name || 'Learner');
      const profile = {
        id: rawProfile && rawProfile.id || defaults.id,
        name: rawProfile && rawProfile.name || defaults.name,
        createdAt: rawProfile && rawProfile.createdAt || defaults.createdAt,
        itemStates: rawProfile && rawProfile.itemStates && typeof rawProfile.itemStates === 'object' ? rawProfile.itemStates : {},
        facetStates: rawProfile && rawProfile.facetStates && typeof rawProfile.facetStates === 'object' ? rawProfile.facetStates : {},
        customItems: Array.isArray(rawProfile && rawProfile.customItems) ? rawProfile.customItems.map(hydrateCustomItem).filter(Boolean) : [],
        lexiconAdds: Object.assign({}, defaults.lexiconAdds, rawProfile && rawProfile.lexiconAdds || {}),
        generatedStats: Object.assign({}, defaults.generatedStats, rawProfile && rawProfile.generatedStats || {}),
        attemptLog: Array.isArray(rawProfile && rawProfile.attemptLog) ? rawProfile.attemptLog.slice(-1800) : [],
        notes: typeof (rawProfile && rawProfile.notes) === 'string' ? rawProfile.notes : ''
      };
      return profile;
    });

    if (!safe.activeProfileId || !safe.profiles.some(profile => profile.id === safe.activeProfileId)) {
      safe.activeProfileId = safe.profiles[0].id;
    }
    return safe;
  }

  function loadDB() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (!raw) return migrateDB(null);
      return migrateDB(JSON.parse(raw));
    } catch (err) {
      console.warn('Failed to load app data:', err);
      return migrateDB(null);
    }
  }

  function saveDB() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(APP.db));
  }

    return APP.db.profiles.find(profile => profile.id === APP.db.activeProfileId) || APP.db.profiles[0];
